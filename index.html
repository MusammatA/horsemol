<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>horsemol</title>
    <style>
      :root {
        --page-gutter: clamp(0.75rem, 2vw, 1.25rem);
        --strip-height: clamp(3.1rem, 6vw, 3.8rem);
        --todo-tool-width: clamp(10rem, calc(100vw - (var(--page-gutter) * 2) - 8.4rem), 20.5rem);
        --desk-tool-width: clamp(8.9rem, 16vw, 11.25rem);
        --modal-width: min(34rem, calc(100vw - 2rem));
        --timer-panel-width: min(56rem, calc(100vw - 2rem));
        --account-panel-width: min(64rem, calc(100vw - 2rem));
        --ornament-frame-inset: 0.48rem;
        --up-next-visible-count: 5;
        --altai-blue-rgb: 51, 153, 255;
        --scroll-distance: 0px;
        --scroll-duration: 12s;
        --strip-color-rgb: 82, 98, 111;
        --strip-foreground-rgb: 255, 255, 255;
        --strip-foreground: rgb(var(--strip-foreground-rgb));
        background: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        min-height: 100vh;
        overflow: hidden;
        background: #000000;
        font-family: "Trebuchet MS", "Gill Sans", sans-serif;
      }

      #background-switcher {
        position: relative;
        display: block;
        width: 100vw;
        height: 100vh;
        border: 0;
        padding: 0;
        overflow: hidden;
        cursor: pointer;
        background: #000000;
        user-select: none;
      }

      .background-image {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 100vw;
        height: 100vh;
        object-fit: cover;
        object-position: center;
        --image-base-transform: translate(-50%, -50%);
        transform: var(--image-base-transform);
        transform-origin: center center;
        background: #000000;
        opacity: 0;
        pointer-events: none;
        transition: opacity 520ms ease;
        will-change: transform, opacity;
      }

      .background-image.is-visible {
        opacity: 1;
      }

      .background-image.is-rotated {
        width: 100vh;
        height: 100vw;
      }

      #background-switcher.is-water-waving .background-image.is-visible {
        animation: background-water-wave 8.8s ease-in-out infinite;
      }

      @keyframes background-water-wave {
        0% {
          transform: var(--image-base-transform) translate3d(0px, 0px, 0) scale(1.028);
        }

        22% {
          transform: var(--image-base-transform) translate3d(10px, -7px, 0) scale(1.04);
        }

        46% {
          transform: var(--image-base-transform) translate3d(-7px, 8px, 0) scale(1.048);
        }

        68% {
          transform: var(--image-base-transform) translate3d(8px, 5px, 0) scale(1.038);
        }

        100% {
          transform: var(--image-base-transform) translate3d(0px, 0px, 0) scale(1.028);
        }
      }

      #background-switcher:focus-visible,
      .transport-control:focus-visible {
        outline: 2px solid rgba(255, 255, 255, 0.88);
        outline-offset: 0.2rem;
      }

      #background-hint {
        position: fixed;
        left: var(--page-gutter);
        bottom: var(--page-gutter);
        z-index: 4;
        color: rgba(255, 255, 255, 0.82);
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        text-shadow: 0 0.2rem 0.8rem rgba(0, 0, 0, 0.38);
        pointer-events: none;
        user-select: none;
      }

      #griff-runner-lane {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        height: clamp(7rem, 14vw, 9.25rem);
        overflow: hidden;
        pointer-events: none;
        z-index: 3;
      }

      #griff-runner-track {
        position: absolute;
        left: 0;
        bottom: -0.95rem;
        animation: griff-run-across 18s linear infinite;
        will-change: transform;
      }

      #griff-runner {
        display: block;
        width: clamp(5.9rem, 12vw, 8.85rem);
        height: auto;
        filter: drop-shadow(0 0.55rem 0.9rem rgba(0, 0, 0, 0.28));
        animation: griff-run-bob 1.08s ease-in-out infinite;
        will-change: transform;
      }

      @keyframes griff-run-across {
        0% {
          transform: translate3d(-12rem, 0, 0);
        }

        100% {
          transform: translate3d(calc(100vw + 12rem), 0, 0);
        }
      }

      @keyframes griff-run-bob {
        0%,
        100% {
          transform: scaleX(-1) translateY(0);
        }

        50% {
          transform: scaleX(-1) translateY(-0.22rem);
        }
      }

      #music-stack {
        position: fixed;
        top: var(--page-gutter);
        left: var(--page-gutter);
        z-index: 5;
        width: min(44rem, calc(50vw - (var(--page-gutter) * 2)));
        display: grid;
        gap: 0.46rem;
        pointer-events: none;
      }

      #music-title-tab {
        width: 100%;
        min-height: 2.5rem;
        padding: 0.58rem 1rem;
        border: 1px solid rgba(255, 255, 255, 0.24);
        border-radius: 999px;
        background:
          linear-gradient(
            135deg,
            rgba(var(--altai-blue-rgb), 0.3),
            rgba(var(--altai-blue-rgb), 0.16)
          );
        box-shadow: 0 0.8rem 2rem rgba(0, 0, 0, 0.2);
        backdrop-filter: blur(14px);
        color: rgba(255, 255, 255, 0.96);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: clamp(0.76rem, 1.3vw, 0.94rem);
        font-weight: 700;
        letter-spacing: 0.06em;
        line-height: 1.2;
        text-align: center;
        text-shadow: 0 0.2rem 0.8rem rgba(0, 0, 0, 0.28);
        pointer-events: none;
      }

      #music-strip {
        position: relative;
        display: flex;
        align-items: center;
        gap: 0.8rem;
        width: 100%;
        pointer-events: auto;
        color: var(--strip-foreground);
        min-height: var(--strip-height);
        padding: 0.5rem 0.65rem 0.5rem 0.95rem;
        border: 1px solid rgba(var(--strip-foreground-rgb), 0.24);
        border-radius: 999px;
        background: linear-gradient(
          90deg,
          rgba(var(--strip-color-rgb), 0.94),
          rgba(var(--strip-color-rgb), 0.72)
        );
        box-shadow: 0 0.8rem 2rem rgba(0, 0, 0, 0.25);
        backdrop-filter: blur(14px);
        transition: background 220ms ease, border-color 220ms ease, color 220ms ease;
      }

      #transport-controls {
        flex: 0 0 auto;
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 0.32rem;
      }

      .transport-control {
        flex: 0 0 auto;
        border: 0;
        border-radius: 999px;
        display: grid;
        place-items: center;
        cursor: pointer;
        color: inherit;
        background: rgba(var(--strip-foreground-rgb), 0.16);
        transition: background-color 160ms ease, transform 160ms ease;
      }

      .transport-control:hover {
        background: rgba(var(--strip-foreground-rgb), 0.24);
      }

      .transport-control:active {
        transform: scale(0.97);
      }

      .transport-chip {
        min-width: 2.8rem;
        height: 2.15rem;
        padding: 0 0.72rem;
        font-size: 0.66rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      #player-toggle {
        width: 2.35rem;
        height: 2.35rem;
      }

      .player-icon {
        position: relative;
        display: block;
        width: 0.92rem;
        height: 0.92rem;
      }

      .player-icon::before,
      .player-icon::after {
        content: "";
        position: absolute;
        inset: 0;
        transition: all 160ms ease;
        background: currentColor;
      }

      #player-toggle:not(.is-playing) .player-icon::before {
        clip-path: polygon(18% 8%, 92% 50%, 18% 92%);
      }

      #player-toggle:not(.is-playing) .player-icon::after {
        opacity: 0;
      }

      #player-toggle.is-playing .player-icon::before,
      #player-toggle.is-playing .player-icon::after {
        width: 0.24rem;
        border-radius: 999px;
        clip-path: none;
        opacity: 1;
      }

      #player-toggle.is-playing .player-icon::before {
        left: 0.16rem;
      }

      #player-toggle.is-playing .player-icon::after {
        left: auto;
        right: 0.16rem;
      }

      #track-window {
        flex: 1 1 auto;
        width: 0;
        min-width: 0;
        overflow: hidden;
        position: relative;
      }

      #track-window::before,
      #track-window::after {
        content: "";
        position: absolute;
        top: 0;
        bottom: 0;
        width: 2.35rem;
        pointer-events: none;
        z-index: 1;
        transition: opacity 220ms ease;
      }

      #track-window::before {
        left: 0;
        opacity: 0;
        background: linear-gradient(
          90deg,
          rgba(var(--strip-color-rgb), 0.94),
          rgba(var(--strip-color-rgb), 0)
        );
      }

      #track-window::after {
        right: 0;
        background: linear-gradient(
          90deg,
          rgba(var(--strip-color-rgb), 0),
          rgba(var(--strip-color-rgb), 0.82)
        );
      }

      #track-window.is-scrolling::before {
        opacity: 1;
      }

      #track-marquee {
        display: flex;
        align-items: center;
        gap: 2.5rem;
        width: max-content;
        max-width: none;
        color: inherit;
        white-space: nowrap;
        will-change: transform;
      }

      #track-title,
      #track-title-clone {
        display: inline-block;
        font-size: clamp(0.85rem, 1.5vw, 1rem);
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      #track-title-clone {
        display: none;
      }

      #track-window.is-scrolling #track-title-clone {
        display: inline-block;
      }

      #track-window.is-scrolling #track-marquee {
        animation: marquee-scroll var(--scroll-duration) ease-in-out infinite;
      }

      #up-next-list {
        display: grid;
        gap: 0.34rem;
        max-height: calc(
          (2.45rem * var(--up-next-visible-count)) + (0.34rem * (var(--up-next-visible-count) - 1))
        );
        overflow-y: auto;
        padding-right: 0.3rem;
        pointer-events: auto;
        overscroll-behavior: contain;
        scrollbar-gutter: stable;
        scrollbar-width: thin;
        scrollbar-color: rgba(var(--strip-foreground-rgb), 0.34) rgba(0, 0, 0, 0.12);
      }

      #up-next-list::-webkit-scrollbar {
        width: 0.38rem;
      }

      #up-next-list::-webkit-scrollbar-track {
        background: rgba(0, 0, 0, 0.12);
        border-radius: 999px;
      }

      #up-next-list::-webkit-scrollbar-thumb {
        background: rgba(var(--strip-foreground-rgb), 0.34);
        border-radius: 999px;
      }

      .up-next-item {
        display: flex;
        align-items: center;
        gap: 0.7rem;
        min-height: 2.45rem;
        padding: 0.5rem 0.95rem;
        border: 1px solid rgba(var(--strip-foreground-rgb), 0.16);
        border-radius: 999px;
        background: rgba(var(--strip-color-rgb), 0.5);
        color: var(--strip-foreground);
        backdrop-filter: blur(12px);
        box-shadow: 0 0.5rem 1.4rem rgba(0, 0, 0, 0.16);
        transition: background 220ms ease, border-color 220ms ease, color 220ms ease;
        opacity: 0.52;
      }

      .up-next-item.depth-1 {
        opacity: 0.8;
      }

      .up-next-item.depth-2 {
        opacity: 0.68;
        transform: translateX(0.35rem);
      }

      .up-next-item.depth-3 {
        opacity: 0.56;
        transform: translateX(0.7rem);
      }

      .up-next-item.depth-4 {
        opacity: 0.44;
        transform: translateX(1.05rem);
      }

      .up-next-item.depth-5 {
        opacity: 0.32;
        transform: translateX(1.4rem);
      }

      .up-next-position {
        flex: 0 0 auto;
        min-width: 1.75rem;
        font-size: 0.68rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        opacity: 0.74;
      }

      .up-next-title {
        flex: 1 1 auto;
        min-width: 0;
        overflow: hidden;
        font-size: clamp(0.78rem, 1.35vw, 0.94rem);
        letter-spacing: 0.04em;
        text-overflow: ellipsis;
        text-transform: uppercase;
        white-space: nowrap;
      }

      #notes-layer {
        position: fixed;
        inset: 0;
        z-index: 8;
        pointer-events: none;
      }

      #desk-tools {
        position: fixed;
        top: var(--page-gutter);
        right: var(--page-gutter);
        z-index: 9;
        display: flex;
        width: var(--desk-tool-width);
        flex-direction: column;
        align-items: stretch;
        gap: 0.62rem;
        pointer-events: none;
      }

      #todo-dock {
        position: fixed;
        top: var(--page-gutter);
        left: 50%;
        z-index: 9;
        width: var(--todo-tool-width);
        transform: translateX(-50%);
        display: flex;
        flex-direction: column;
        align-items: stretch;
        gap: 0.58rem;
        pointer-events: auto;
      }

      #account-tab,
      #timer-tab,
      #todo-tab,
      #sticky-note-tab {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.62rem;
        width: 100%;
        padding: 0.58rem 0.72rem 0.58rem 0.82rem;
        border: 1px solid rgba(255, 255, 255, 0.24);
        border-radius: 1rem;
        background:
          linear-gradient(
            135deg,
            rgba(var(--altai-blue-rgb), 0.3),
            rgba(var(--altai-blue-rgb), 0.16)
          );
        box-shadow: 0 0.7rem 1.8rem rgba(0, 0, 0, 0.16);
        backdrop-filter: blur(14px);
        color: rgba(255, 255, 255, 0.94);
        font: inherit;
        pointer-events: auto;
        user-select: none;
        appearance: none;
      }

      #account-tab {
        cursor: pointer;
        touch-action: manipulation;
      }

      #timer-tab {
        cursor: pointer;
        touch-action: manipulation;
      }

      #todo-tab {
        cursor: pointer;
        touch-action: manipulation;
      }

      #sticky-note-tab {
        cursor: grab;
        touch-action: none;
      }

      #sticky-note-tab:active {
        cursor: grabbing;
      }

      #account-tab:focus-visible,
      #timer-tab:focus-visible,
      #todo-tab:focus-visible,
      #sticky-note-tab:focus-visible,
      .sticky-note-card:focus-visible,
      .sticky-swatch:focus-visible,
      #note-title-input:focus-visible,
      #note-body-input:focus-visible,
      .todo-toggle:focus-visible,
      .todo-input:focus-visible,
      .todo-delete:focus-visible {
        outline: 2px solid rgba(255, 255, 255, 0.88);
        outline-offset: 0.2rem;
      }

      .sticky-tab-label {
        font-size: 0.74rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .timer-tab-glyph {
        position: relative;
        width: 1.5rem;
        height: 1.5rem;
        border: 1px solid rgba(255, 255, 255, 0.34);
        border-radius: 999px;
        background: rgba(var(--altai-blue-rgb), 0.18);
        flex: 0 0 auto;
      }

      .timer-tab-glyph::before,
      .timer-tab-glyph::after {
        content: "";
        position: absolute;
        left: 50%;
        top: 50%;
        width: 1px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.82);
        transform-origin: bottom center;
      }

      .timer-tab-glyph::before {
        height: 0.34rem;
        transform: translate(-50%, -100%) rotate(0deg);
      }

      .timer-tab-glyph::after {
        height: 0.46rem;
        transform: translate(-50%, -100%) rotate(58deg);
      }

      .account-tab-avatar {
        width: 1.42rem;
        height: 1.42rem;
        border: 1px solid rgba(255, 255, 255, 0.32);
        border-radius: 999px;
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.22), rgba(255, 255, 255, 0.08)),
          rgba(var(--altai-blue-rgb), 0.18);
        background-position: center;
        background-repeat: no-repeat;
        background-size: cover;
        display: grid;
        place-items: center;
        overflow: hidden;
      }

      .account-tab-avatar.is-photo {
        border-color: rgba(255, 255, 255, 0.46);
      }

      .account-tab-avatar-fallback {
        font-size: 0.62rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.94);
      }

      .sticky-tab-glyphs {
        display: flex;
        align-items: center;
        gap: 0.42rem;
      }

      .sticky-tab-badge {
        position: relative;
        width: 1.5rem;
        height: 1.5rem;
        border: 1px solid rgba(255, 255, 255, 0.34);
        border-radius: 0.45rem;
        background: rgba(var(--altai-blue-rgb), 0.18);
        overflow: hidden;
      }

      .sticky-tab-badge::before {
        content: "";
        position: absolute;
        inset: 0.18rem;
        border-radius: 0.28rem;
        background: repeating-linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.28) 0 2px,
          rgba(255, 255, 255, 0.08) 2px 6px
        );
      }

      .sticky-tab-pencil {
        position: relative;
        width: 1rem;
        height: 0.22rem;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.72);
        transform: rotate(-36deg);
        transform-origin: center;
      }

      .sticky-tab-pencil::before {
        content: "";
        position: absolute;
        left: -0.28rem;
        top: -0.08rem;
        border-style: solid;
        border-width: 0.19rem 0.28rem 0.19rem 0;
        border-color: transparent rgba(255, 255, 255, 0.72) transparent transparent;
      }

      .sticky-tab-pencil::after {
        content: "";
        position: absolute;
        right: -0.14rem;
        top: 0;
        width: 0.2rem;
        height: 0.22rem;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.34);
      }

      #todo-list-panel {
        position: absolute;
        top: calc(100% + 0.58rem);
        left: 0;
        right: auto;
        transform: none;
        width: 100%;
        max-height: calc(100vh - (var(--page-gutter) * 2) - 3.8rem);
        padding: 0.5rem;
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 1rem;
        background: rgba(var(--altai-blue-rgb), 0.2);
        box-shadow: 0 0.7rem 1.8rem rgba(0, 0, 0, 0.14);
        backdrop-filter: blur(14px);
        display: none;
        flex-direction: column;
        gap: 0.42rem;
        overflow-y: auto;
        pointer-events: auto;
        scrollbar-gutter: stable;
        scrollbar-width: thin;
        scrollbar-color: rgba(255, 255, 255, 0.72) rgba(255, 255, 255, 0.08);
      }

      #todo-list-panel.is-visible {
        display: flex;
      }

      #todo-list-panel::-webkit-scrollbar {
        width: 0.7rem;
      }

      #todo-list-panel::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.08);
        border-radius: 999px;
      }

      #todo-list-panel::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.72);
        border-radius: 999px;
        border: 2px solid rgba(255, 255, 255, 0.08);
      }

      .todo-item {
        position: relative;
        display: flex;
        align-items: center;
        gap: 0.54rem;
        min-height: 2.65rem;
        padding: 0.42rem 2rem 0.42rem 0.48rem;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 0.95rem;
        background: rgba(255, 255, 255, 0.08);
        color: rgba(255, 255, 255, 0.94);
      }

      .todo-item.is-complete {
        background: rgba(255, 255, 255, 0.14);
      }

      .todo-toggle {
        position: relative;
        width: 1.1rem;
        height: 1.1rem;
        border: 1px solid rgba(255, 255, 255, 0.6);
        border-radius: 0.28rem;
        background: rgba(255, 255, 255, 0.08);
        padding: 0;
        flex: 0 0 auto;
        cursor: pointer;
      }

      .todo-toggle.is-complete {
        background: rgba(255, 255, 255, 0.86);
        border-color: rgba(255, 255, 255, 0.86);
      }

      .todo-toggle.is-complete::after {
        content: "";
        position: absolute;
        left: 0.28rem;
        top: 0.08rem;
        width: 0.26rem;
        height: 0.52rem;
        border-right: 2px solid rgba(19, 23, 30, 0.92);
        border-bottom: 2px solid rgba(19, 23, 30, 0.92);
        transform: rotate(42deg);
      }

      .todo-input {
        flex: 1 1 auto;
        min-width: 0;
        border: 0;
        padding: 0;
        background: transparent;
        color: inherit;
        font: inherit;
        font-size: 0.82rem;
        line-height: 1.35;
        outline: none;
      }

      .todo-input::placeholder {
        color: rgba(255, 255, 255, 0.54);
      }

      .todo-item.is-complete .todo-input {
        text-decoration: line-through;
        opacity: 0.62;
      }

      .todo-delete {
        position: absolute;
        top: 50%;
        right: 0.42rem;
        width: 1.2rem;
        height: 1.2rem;
        border: 0;
        border-radius: 999px;
        background: transparent;
        color: rgba(255, 255, 255, 0.84);
        display: grid;
        place-items: center;
        padding: 0;
        font: inherit;
        font-size: 0.92rem;
        line-height: 1;
        opacity: 0;
        cursor: pointer;
        pointer-events: none;
        transform: translateY(-50%);
        transition: opacity 160ms ease, background 160ms ease;
      }

      .todo-item:hover .todo-delete,
      .todo-item:focus-within .todo-delete {
        opacity: 1;
        pointer-events: auto;
      }

      .todo-delete:hover {
        background: rgba(255, 255, 255, 0.18);
      }

      #timer-panel-backdrop,
      #account-panel-backdrop {
        position: fixed;
        z-index: 11;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        background: rgba(7, 10, 17, 0.52);
        backdrop-filter: blur(10px);
        pointer-events: auto;
      }

        transform: translateY(-0.12rem);
        box-shadow: 0 1.1rem 2.7rem rgba(0, 0, 0, 0.22);
      }

      .sticky-note-card.is-dragging {
        transition: none;
        transform: scale(1.02);
        box-shadow: 0 1.4rem 3rem rgba(0, 0, 0, 0.28);
        cursor: grabbing;
      }

      .sticky-note-card.is-resizing {
        transition: none;
        transform: none;
        box-shadow: 0 1.4rem 3rem rgba(0, 0, 0, 0.28);
        cursor: nwse-resize;
      }

      .sticky-note-card-title {
        font-size: 0.8rem;
        font-weight: 700;
        line-height: 1.2;
        letter-spacing: 0.01em;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .sticky-note-card-body {
        font-size: 0.82rem;
        line-height: 1.35;
        white-space: pre-wrap;
        overflow: hidden;
        display: -webkit-box;
        -webkit-line-clamp: 6;
        -webkit-box-orient: vertical;
        opacity: 0.8;
      }

      .sticky-note-card-body.is-placeholder {
        font-style: italic;
        opacity: 0.58;
      }

      .sticky-note-delete {
        position: absolute;
        top: 0.38rem;
        left: 0.38rem;
        width: 1.5rem;
        height: 1.5rem;
        border: 0;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.52);
        color: rgba(41, 37, 29, 0.84);
        display: grid;
        place-items: center;
        padding: 0;
        font: inherit;
        font-size: 1.08rem;
        font-weight: 700;
        line-height: 1;
        cursor: pointer;
        touch-action: manipulation;
      }

      .sticky-note-delete:hover {
        background: rgba(255, 255, 255, 0.52);
        color: rgba(41, 37, 29, 0.92);
      }

      .sticky-note-resize-handle {
        position: absolute;
        right: 0.5rem;
        bottom: 0.5rem;
        width: 1.15rem;
        height: 1.15rem;
        border: 0;
        border-radius: 0.48rem;
        background:
          linear-gradient(135deg, transparent 0 42%, rgba(41, 37, 29, 0.22) 42% 50%, transparent 50% 58%, rgba(41, 37, 29, 0.22) 58% 66%, transparent 66% 100%),
          rgba(255, 255, 255, 0.2);
        box-shadow: inset 0 0 0 1px rgba(41, 37, 29, 0.16);
        cursor: nwse-resize;
        touch-action: none;
      }

      .sticky-note-card[data-color="yellow"],
      #note-editor[data-color="yellow"] {
        background: #fff3ab;
      }

      .sticky-note-card[data-color="pink"],
      #note-editor[data-color="pink"] {
        background: #ffd9e6;
      }

      .sticky-note-card[data-color="blue"],
      #note-editor[data-color="blue"] {
        background: #dcefff;
      }

      .sticky-note-card[data-color="green"],
      #note-editor[data-color="green"] {
        background: #ddf4d9;
      }

      #note-editor-backdrop {
        position: fixed;
        inset: 0;
        z-index: 12;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        background: rgba(10, 12, 18, 0.18);
        backdrop-filter: blur(5px);
        opacity: 0;
        pointer-events: none;
        transition: opacity 180ms ease;
      }

      #note-editor-backdrop.is-open {
        opacity: 1;
        pointer-events: auto;
      }

      #note-editor {
        width: min(24rem, calc(100vw - 2rem));
        min-height: min(29rem, calc(100vh - 2rem));
        padding: 1rem 1rem 1.08rem;
        border-radius: 1.2rem;
        box-shadow: 0 1.4rem 3rem rgba(0, 0, 0, 0.25);
        color: #29251d;
        display: flex;
        flex-direction: column;
        gap: 0.9rem;
        transform: translateY(0.6rem) scale(0.96);
        transition: transform 180ms ease, opacity 180ms ease;
      }

      #note-editor-backdrop.is-open #note-editor {
        transform: translateY(0) scale(1);
      }

      #note-editor-header {
        display: flex;
        align-items: flex-start;
        gap: 0.75rem;
      }

      #note-title-input {
        flex: 1 1 auto;
        min-width: 0;
        border: 0;
        padding: 0;
        background: transparent;
        color: inherit;
        font: inherit;
        font-size: 1.08rem;
        font-weight: 700;
        outline: none;
      }

      #note-body-input {
        flex: 1 1 auto;
        min-height: 16rem;
        width: 100%;
        border: 0;
        padding: 0;
        background: transparent;
        color: inherit;
        font: inherit;
        font-size: 0.98rem;
        line-height: 1.45;
        resize: none;
        outline: none;
      }

      #note-title-input::placeholder,
      #note-body-input::placeholder {
        color: rgba(31, 31, 31, 0.52);
      }

      #note-color-picker {
        display: flex;
        align-items: center;
        gap: 0.42rem;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .sticky-swatch {
        width: 1.32rem;
        height: 1.32rem;
        border: 1px solid rgba(24, 24, 24, 0.16);
        border-radius: 999px;
        background: var(--swatch-color);
        padding: 0;
        cursor: pointer;
      }

      .sticky-swatch.is-selected {
        box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.9), 0 0 0 4px rgba(24, 24, 24, 0.22);
      }

      #yt-player-shell {
        position: fixed;
        width: 240px;
        height: 135px;
        right: 0;
        bottom: 0;
        opacity: 0;
        pointer-events: none;
        transform: scale(0.01);
        transform-origin: bottom right;
        overflow: hidden;
        z-index: 0;
        border-radius: 1rem;
        box-shadow: 0 18px 48px rgba(0, 0, 0, 0.22);
        transition:
          opacity 180ms ease,
          transform 180ms ease;
      }

      #yt-player-shell.is-unlock-visible {
        top: calc(var(--page-gutter) + 9.55rem);
        left: var(--page-gutter);
        right: auto;
        bottom: auto;
        opacity: 1;
        pointer-events: auto;
        transform: none;
        z-index: 7;
      }

      #player-unlock-hint {
        position: fixed;
        top: calc(var(--page-gutter) + 7.6rem);
        left: var(--page-gutter);
        max-width: min(18rem, calc(100vw - (var(--page-gutter) * 2)));
        padding: 0.56rem 0.82rem;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.18);
        backdrop-filter: blur(16px);
        color: rgba(25, 25, 25, 0.82);
        font-size: 0.7rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        opacity: 0;
        pointer-events: none;
        transform: translateY(-0.25rem);
        transition:
          opacity 180ms ease,
          transform 180ms ease;
        z-index: 7;
      }

      #player-unlock-hint.is-visible {
        opacity: 1;
        transform: translateY(0);
      }

      @keyframes marquee-scroll {
        0%,
        14% {
          transform: translateX(0);
        }

        86%,
        100% {
          transform: translateX(calc(-1 * var(--scroll-distance)));
        }
      }

      @media (prefers-reduced-motion: reduce) {
        #track-window.is-scrolling #track-marquee {
          animation: none;
        }
      }

      @media (max-width: 960px) {
        #music-stack {
          width: calc(100vw - (var(--page-gutter) * 2));
        }

        #timer-panel-layout,
        #account-panel-layout,
        #timer-panel-footer {
          grid-template-columns: 1fr;
        }

        #timer-start-button {
          width: 100%;
          min-width: 0;
        }
      }

      @media (max-width: 640px) {
        :root {
          --todo-tool-width: clamp(9rem, calc(100vw - (var(--page-gutter) * 2) - 7rem), 15.75rem);
          --desk-tool-width: clamp(8.3rem, 42vw, 10rem);
          --modal-width: min(100vw - 1rem, 28rem);
          --timer-panel-width: min(100vw - 1rem, 34rem);
          --account-panel-width: min(100vw - 1rem, 36rem);
          --ornament-frame-inset: 0.34rem;
        }

        #music-strip {
          padding-left: 0.78rem;
          padding-right: 0.52rem;
          gap: 0.55rem;
        }

        #music-title-tab {
          min-height: 2.3rem;
          padding: 0.54rem 0.82rem;
          font-size: 0.72rem;
          letter-spacing: 0.05em;
        }

        #transport-controls {
          gap: 0.24rem;
        }

        .transport-chip {
          min-width: 2.4rem;
          padding: 0 0.52rem;
          font-size: 0.6rem;
        }

        #timer-tab,
        #todo-tab,
        #sticky-note-tab {
          padding: 0.54rem 0.62rem 0.54rem 0.68rem;
        }

        .sticky-tab-label {
          font-size: 0.68rem;
        }

        #timer-custom-fields {
          grid-template-columns: 1fr;
        }

        #timer-preset-options,
        #timer-focus-options {
          grid-template-columns: 1fr;
        }

        #account-warrior-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        #timer-panel,
        #account-panel {
          padding: 1.35rem 1.04rem 1.9rem;
        }

        #timer-panel-layout,
        #account-panel-layout {
          padding: 0.98rem 0.08rem 0 0.92rem;
        }

        #auth-card {
          width: min(100vw - 1rem, 30rem);
          grid-template-columns: 1fr;
          padding: 1.48rem 1.06rem 1.62rem 3rem;
        }

        #auth-actions {
          justify-self: start;
        }

        #todo-list-panel {
          max-height: calc(100vh - (var(--page-gutter) * 2) - 3.5rem);
          padding: 0.42rem;
        }

        .todo-item {
          min-height: 2.5rem;
          padding-right: 1.8rem;
        }

        .sticky-note-card {
          width: 8.85rem;
          min-width: 6.5rem;
          min-height: 6.5rem;
        }

        #note-editor {
          min-height: calc(100vh - 2rem);
        }

        .up-next-item:nth-child(n) {
          transform: none;
        }
      }

            <div id="timer-panel-heading">

              <div id="timer-preset-options">

                  <span class="timer-choice-text">
                    <span class="timer-choice-title">25 / 5</span>
                    <span class="timer-choice-copy">25 minutes focus, 5 minute break</span>
                  </span>
                </button>

                  <span class="timer-choice-text">

                  </span>
                </button>

                  <span class="timer-choice-text">
                    <span class="timer-choice-title">90 / 20</span>
                    <span class="timer-choice-copy">90 minutes focus, 20 minute break</span>
                  </span>
                </button>

      function normalizeFocusStats(input) {
        const normalized = createEmptyFocusStats();

        if (!input || typeof input !== "object") {
          return normalized;
        }

        const rawCategories =
          input.categories && typeof input.categories === "object" ? input.categories : {};

        focusCategories.forEach((category) => {
          const value = Number(rawCategories[category]);

          normalized.categories[category] = Number.isFinite(value) && value > 0 ? value : 0;
        });

        const explicitTotal = Number(input.totalMs);
        const computedTotal = focusCategories.reduce(
          (sum, category) => sum + normalized.categories[category],
          0,
        );

        normalized.totalMs =
          Number.isFinite(explicitTotal) && explicitTotal > computedTotal ? explicitTotal : computedTotal;

        return normalized;
      }

        const normalized = normalizeFocusStats(stats);

      function formatDurationCompact(totalMs) {
        const roundedMinutes = Math.round(Math.max(0, Number(totalMs) || 0) / 60000);

        if (!roundedMinutes) {
          return "0m";
        }

        const hours = Math.floor(roundedMinutes / 60);
        const minutes = roundedMinutes % 60;

        if (!hours) {
          return `${roundedMinutes}m`;
        }

        if (!minutes) {
          return `${hours}h`;
        }

        return `${hours}h ${minutes}m`;
      }

      function formatTimerClock(remainingMs) {

        const hours = Math.floor(totalSeconds / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = totalSeconds % 60;

        if (hours) {
          return `${String(hours).padStart(2, "0")}:${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
        }

        return `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
      }

      async function playGentleAlarm() {
        const audioContext = await ensureAlarmAudioReady();

        if (!audioContext) {
          return;
        }

        const notes = [
          { delay: 0, duration: 0.18, frequency: 659.25 },
          { delay: 0.26, duration: 0.22, frequency: 783.99 },
          { delay: 0.56, duration: 0.28, frequency: 987.77 },
        ];
        const repeatCount = 3;
        const repeatGap = 0.38;
        const patternDuration = notes[notes.length - 1].delay + notes[notes.length - 1].duration;
        const repeatDuration = patternDuration + repeatGap;
        const startAt = audioContext.currentTime + 0.02;

        for (let repeatIndex = 0; repeatIndex < repeatCount; repeatIndex += 1) {
          const repeatOffset = repeatIndex * repeatDuration;

          notes.forEach((note) => {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            const noteStart = startAt + repeatOffset + note.delay;
            const peakGain = repeatIndex === repeatCount - 1 ? 0.1 : 0.082;

            oscillator.type = "triangle";
            oscillator.frequency.setValueAtTime(note.frequency, noteStart);
            gainNode.gain.setValueAtTime(0.0001, noteStart);
            gainNode.gain.linearRampToValueAtTime(peakGain, noteStart + 0.03);
            gainNode.gain.exponentialRampToValueAtTime(0.0001, noteStart + note.duration);

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            oscillator.start(noteStart);
            oscillator.stop(noteStart + note.duration + 0.04);
          });
        }

        const totalDuration = repeatDuration * repeatCount;

        await new Promise((resolve) => {
          window.setTimeout(resolve, totalDuration * 1000);
        });

        const completedPhase = timerPhase;
        const completedConfig = activeTimerConfig;

        clearTimerInterval();
        timerEndAt = 0;

        if (!completedConfig) {
          timerPhase = "complete";
          timerVisible = true;
          updateTimerDisplay(0);
          return;
        }

        if (completedPhase === "focus") {
          pauseMusicForTimer();
          await playGentleAlarm();
          recordFocusSession(
            completedConfig.focusCategory,
            Math.round(completedConfig.focusMinutes * 60000),
          );

          if (completedConfig.breakMinutes > 0) {
            setTimerPanelStatus(`Break started for ${completedConfig.breakMinutes} minutes.`);
            startTimerPhase("break", completedConfig.breakMinutes * 60000);
            return;
          }
        } else if (completedPhase === "break") {
          await playGentleAlarm();
          setTimerPanelStatus("");
        }

        timerPhase = "complete";
        activeTimerConfig = null;
        timerVisible = true;
        updateTimerDisplay(0);

      function interleavePlaylistTracks(primaryTracks, secondaryTracks) {
        const baseTracks = Array.isArray(primaryTracks) ? primaryTracks.filter(Boolean) : [];
        const extraTracks = Array.isArray(secondaryTracks) ? secondaryTracks.filter(Boolean) : [];
        const mixedTracks = [];
        const totalSteps = Math.max(baseTracks.length, extraTracks.length);

        for (let index = 0; index < totalSteps; index += 1) {
          if (baseTracks[index]) {
            mixedTracks.push(baseTracks[index]);
          }

          if (extraTracks[index]) {
            mixedTracks.push(extraTracks[index]);
          }
        }

        return mixedTracks.filter((track) => track && track.title && track.videoId);

          loader.onload = () => resolve(loader);

      function applyBackgroundImage(element, imagePath, loadedImage) {
        const framing = imageFraming[imagePath] || {};
        const rotationAngle = imageRotations[imagePath] || "-90deg";
        const shouldRotate = loadedImage.naturalHeight > loadedImage.naturalWidth;
        const width = shouldRotate ? framing.rotatedWidth || "100vh" : framing.width || "100vw";
        const height = shouldRotate ? framing.rotatedHeight || "100vw" : framing.height || "100vh";
        const offsetY = framing.offsetY || "0px";
        const transform = shouldRotate
          ? `translate(-50%, calc(-50% + ${offsetY})) rotate(${rotationAngle})`
          : `translate(-50%, calc(-50% + ${offsetY}))`;

        element.style.setProperty("--rotation-angle", rotationAngle);
        element.style.setProperty("--image-base-transform", transform);
        element.style.width = width;
        element.style.height = height;
        element.style.objectPosition = framing.objectPosition || "center";
        element.classList.toggle("is-rotated", shouldRotate);
        element.src = `${encodeURI(imagePath)}?v=${imageAssetVersion}`;
      }

        if (!snapshot) {

        isRestoringUndo = true;

        todoItems = Array.isArray(snapshot.todoItems) ? snapshot.todoItems.map(cloneTodoItem) : [];

          const snapshot = await profileRef.get();

              {
                email: user.email || "",

                focusStats: createEmptyFocusStats(),
                photoURL: "",
                warriorName: "",
                updatedAt: firebase.firestore.FieldValue.serverTimestamp(),

          const savedPhotoUrl = typeof data.photoURL === "string" ? data.photoURL : "";
          const savedWarriorName =
            typeof data.warriorName === "string" ? data.warriorName : "";

            getWarriorProfileByName(savedWarriorName) || getWarriorProfileByPhotoUrl(savedPhotoUrl);

              warriorName: inferredWarriorProfile ? inferredWarriorProfile.name : "",

          return {
            errorMessage: describeProfileError(error),
            profile: createEmptyAccountProfile(),
          };
        }
      }

      async function handleAccountAuthStateChange(user) {
        const loadToken = ++accountProfileLoadToken;
        authStateResolved = true;

        accountUser = user;
        accountProfile = createEmptyAccountProfile();

        if (!user) {
          closeAccountPanel();
          syncAccountUi();
          closeAuthPrompt({ force: true });
          setAuthStatus(
            authConfigured
              ? "Sign in with your Google account to save your work."
              : authStatus.textContent || "Google sign-in is not ready yet.",
          );
          setAccountStatus("");
          return;
        }

        guestSavePromptShown = false;
        closeAuthPrompt({ force: true });
        setAuthStatus(user.email ? `Signed in as ${user.email}.` : "Signed in with Google.");
        syncAccountUi();
        setAccountStatus("Loading your account...");

        const profileResult = await loadAccountProfile(user);

        if (loadToken !== accountProfileLoadToken) {
          return;
        }

        accountProfile = profileResult.profile;
        syncAccountUi();
        setAccountStatus(profileResult.errorMessage || "Account ready.");
      }

      async function initializeAccountAuth() {
        syncAccountUi();
        closeAuthPrompt();
        setAuthPromptMode("account");
        setAuthStatus("Checking sign-in...");
        authSetupNote.textContent = "";

        if (!isHostedAuthContext()) {
          setAuthUnavailable(
            "Google sign-in only works from localhost or an authorized HTTPS domain. Open your deployed site instead of file://.",
            "Google sign-in is unavailable on this local file.",
          );
          return;
        }

        if (!window.firebase) {
          setAuthUnavailable(
            "Firebase could not load from the CDN. Check your connection or deployment settings.",
            "Google sign-in libraries did not load.",
          );
          return;
        }

        if (!isFirebaseConfigReady(firebaseConfig)) {
          setAuthUnavailable(
            `Add your Firebase web config, enable Google sign-in, and authorize ${getAuthorizedDomainHint()} in Firebase Authentication.`,
            "Google sign-in still needs Firebase setup.",
          );
          return;
        }

        try {
          firebaseApp = firebase.apps.length ? firebase.app() : firebase.initializeApp(firebaseConfig);
          firebaseAuth = firebase.auth();
          firestoreDb = firebase.firestore();
          googleAuthProvider = new firebase.auth.GoogleAuthProvider();
          googleAuthProvider.setCustomParameters({ prompt: "select_account" });
          authConfigured = true;
          authSetupNote.textContent = `If Google blocks sign-in, add ${getAuthorizedDomainHint()} to Firebase Authentication authorized domains.`;
          syncAccountButtonsState();

          try {
            await firebaseAuth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
          } catch (error) {
            // Keep Firebase's default persistence if overriding it fails.
          }

          firebaseAuth.onAuthStateChanged((user) => {
            void handleAccountAuthStateChange(user);
          });

          try {
            await firebaseAuth.getRedirectResult();
          } catch (error) {
            setAuthStatus(describeAuthError(error));
          }
        } catch (error) {
          setAuthUnavailable(
            "Double-check the Firebase project settings and make sure Authentication and Firestore are enabled.",
            "Firebase could not be initialized.",
          );
        }
      }

      async function signInWithGoogle() {
        if (!authConfigured || !firebaseAuth || !googleAuthProvider || authBusy) {
          return;
        }

        authBusy = true;
        syncAccountButtonsState();
        setAuthStatus("Opening Google sign-in...");

        try {
          const shouldUseRedirect =
            window.matchMedia("(pointer: coarse)").matches || window.innerWidth <= 768;

          if (shouldUseRedirect) {
            setAuthStatus("Redirecting to Google sign-in...");
            await firebaseAuth.signInWithRedirect(googleAuthProvider);
            return;
          }

          await firebaseAuth.signInWithPopup(googleAuthProvider);
        } catch (error) {
          if (
            error &&
            (error.code === "auth/popup-blocked" || error.code === "auth/web-storage-unsupported")
          ) {
            setAuthStatus("Popup blocked. Redirecting to Google sign-in...");
            await firebaseAuth.signInWithRedirect(googleAuthProvider);
            return;
          }

          setAuthStatus(describeAuthError(error));
        } finally {
          authBusy = false;
          syncAccountButtonsState();
        }
      }

      function loadImageFromFile(file) {
        return new Promise((resolve, reject) => {
          const objectUrl = URL.createObjectURL(file);
          const image = new Image();

          image.onload = () => {
            URL.revokeObjectURL(objectUrl);
            resolve(image);
          };

          image.onerror = () => {
            URL.revokeObjectURL(objectUrl);
            reject(new Error("That image could not be opened."));
          };

          image.src = objectUrl;
        });
      }

      async function createProfilePhotoDataUrl(file) {
        if (!(file instanceof File) || !file.type.startsWith("image/")) {
          throw new Error("Choose an image file for your profile.");
        }

        const image = await loadImageFromFile(file);
        const sourceWidth = image.naturalWidth || image.width;
        const sourceHeight = image.naturalHeight || image.height;

        if (!sourceWidth || !sourceHeight) {
          throw new Error("That image could not be read.");
        }

        const maxDimension = 720;
        const scale = Math.min(1, maxDimension / Math.max(sourceWidth, sourceHeight));
        const width = Math.max(1, Math.round(sourceWidth * scale));
        const height = Math.max(1, Math.round(sourceHeight * scale));
        const canvas = document.createElement("canvas");
        const context = canvas.getContext("2d");

        if (!context) {
          throw new Error("Your browser could not process that image.");
        }

        canvas.width = width;
        canvas.height = height;
        context.clearRect(0, 0, width, height);
        context.drawImage(image, 0, 0, width, height);

        let outputType = file.type === "image/png" ? "image/png" : "image/jpeg";
        let quality = 0.9;
        let dataUrl = canvas.toDataURL(outputType, quality);

        if (dataUrl.length > 520000) {
          outputType = "image/jpeg";
          quality = 0.88;
          dataUrl = canvas.toDataURL(outputType, quality);

          while (dataUrl.length > 520000 && quality > 0.5) {
            quality -= 0.08;
            dataUrl = canvas.toDataURL(outputType, quality);
          }
        }

        if (dataUrl.length > 700000) {
          throw new Error("That photo is too large. Choose a smaller image.");
        }

        return dataUrl;
      }

      async function saveAccountProfile({
        photoURL = accountProfile.photoURL,
        statusMessage = "Account saved.",
        warriorName = accountProfile.warriorName,

        if (!accountUser || !firestoreDb || accountSaveInFlight) {
          return;

        const profileRef = getAccountProfileRef();

        if (!profileRef) {
          setAccountStatus("Your account storage is not ready yet.");
          return;

        const normalizedPhotoUrl = typeof photoURL === "string" ? photoURL.trim() : "";
        const normalizedWarriorName = typeof warriorName === "string" ? warriorName.trim() : "";

        accountSaveInFlight = true;
        syncAccountButtonsState();
        setAccountStatus("Saving account...");

        try {
          await profileRef.set(
            {
              email: accountUser.email || "",
              focusStats: cloneFocusStats(accountProfile.focusStats),
              googleDisplayName: accountUser.displayName || "",
              googlePhotoURL: accountUser.photoURL || "",
              photoURL: normalizedPhotoUrl,
              updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
              username,
              warriorName: normalizedWarriorName,
            },
            { merge: true },
          );
          accountProfile = {
            ...accountProfile,
            photoURL: normalizedPhotoUrl,

            warriorName: normalizedWarriorName,

      function createTodoItemId() {
        return `todo-${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 8)}`;
      }

      function findTodoItem(itemId) {
        return todoItems.find((item) => item.id === itemId) || null;
      }

      function syncTodoPanelVisibility() {
        const hasItems = todoItems.length > 0;

        todoListPanel.classList.toggle("is-visible", hasItems);
        todoListPanel.setAttribute("aria-hidden", hasItems ? "false" : "true");
      }

      function persistTodoItems() {
        try {
          const serializableItems = todoItems.map((item) => ({
            id: item.id,
            text: item.text,
            completed: item.completed,
          }));

          window.localStorage.setItem(todoStorageKey, JSON.stringify(serializableItems));
        } catch (error) {
          // Ignore storage failures and keep to-do state in memory.
        }
      }

      function syncTodoItemElement(item) {
        let element = todoElements.get(item.id);

        if (!element) {
          element = document.createElement("div");
          element.className = "todo-item";
          element.dataset.id = item.id;
          element.innerHTML =
            '<button class="todo-toggle" type="button" aria-label="Mark to-do complete" aria-pressed="false"></button><input class="todo-input" type="text" maxlength="120" placeholder="Write a short note" /><button class="todo-delete" type="button" aria-label="Delete to-do item">×</button>';
          element.querySelector(".todo-toggle").addEventListener("click", onTodoToggleClick);
          element.querySelector(".todo-input").addEventListener("beforeinput", onTodoBeforeInput);
          element.querySelector(".todo-input").addEventListener("keydown", onTodoInputKeyDown);
          element.querySelector(".todo-input").addEventListener("input", onTodoInput);
          element.querySelector(".todo-delete").addEventListener("click", onTodoDeleteClick);
          todoListPanel.append(element);
          todoElements.set(item.id, element);
        }

        const toggleButton = element.querySelector(".todo-toggle");
        const input = element.querySelector(".todo-input");

        element.classList.toggle("is-complete", item.completed);
        toggleButton.classList.toggle("is-complete", item.completed);
        toggleButton.setAttribute("aria-pressed", item.completed ? "true" : "false");
        toggleButton.setAttribute("aria-label", item.completed ? "Mark to-do incomplete" : "Mark to-do complete");

        if (input.value !== item.text) {
          input.value = item.text;
        }

        syncTodoPanelVisibility();
      }

      function deleteTodoItem(itemId) {
        const itemIndex = todoItems.findIndex((item) => item.id === itemId);

        if (itemIndex < 0) {
          return;
        }

        todoItems.splice(itemIndex, 1);

        const element = todoElements.get(itemId);

        if (element) {
          element.remove();
          todoElements.delete(itemId);
        }

        syncTodoPanelVisibility();
        persistTodoItems();
      }

      function addTodoItem() {
        const item = {
          id: createTodoItemId(),
          text: "",
          completed: false,
        };

        todoItems.push(item);
        syncTodoItemElement(item);
        persistTodoItems();

        const element = todoElements.get(item.id);

        if (!element) {
          return;
        }

        const input = element.querySelector(".todo-input");

        element.scrollIntoView({ block: "nearest" });
        window.requestAnimationFrame(() => {
          input.focus({ preventScroll: true });
        });
      }

      function onTodoTabClick() {

      function onTodoToggleClick(event) {

        const item = findTodoItem(itemElement.dataset.id);

        if (!item) {

        if (event.key.length === 1 || event.key === "Backspace" || event.key === "Delete") {
          captureUndoSnapshot();
        }
      }

      function onTodoInputKeyDown(event) {
        if (
          event.key === "Enter" &&
          !event.metaKey &&
          !event.ctrlKey &&
          !event.altKey &&
          !event.shiftKey
        ) {
          event.preventDefault();
          event.currentTarget.blur();
          return;
        }

        onEditableKeyDown(event);
      }

      function onTodoInput(event) {
        const itemElement = event.currentTarget.closest(".todo-item");
