<!DOCTYPE html>
<html lang="en">
  <head>

    <style>
      :root {
        --page-gutter: clamp(0.75rem, 2vw, 1.25rem);
        --strip-height: clamp(3.1rem, 6vw, 3.8rem);
        --scroll-distance: 0px;
        --scroll-duration: 12s;
        --strip-color-rgb: 82, 98, 111;
        --strip-foreground-rgb: 255, 255, 255;
        --strip-foreground: rgb(var(--strip-foreground-rgb));
        background: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        min-height: 100vh;
        overflow: hidden;
        background: #000000;
        font-family: "Trebuchet MS", "Gill Sans", sans-serif;
      }

      #background-switcher {
        position: relative;
        display: block;
        width: 100vw;
        height: 100vh;
        border: 0;
        padding: 0;
        overflow: hidden;
        cursor: pointer;
        background: #000000;
        user-select: none;
      }

      .background-image {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 100vw;
        height: 100vh;
        object-fit: cover;
        object-position: center;
        transform: translate(-50%, -50%);
        background: #000000;
        opacity: 0;
        pointer-events: none;
        transition: opacity 520ms ease;
        will-change: transform, opacity;
      }

      .background-image.is-visible {
        opacity: 1;
      }

      .background-image.is-rotated {
        width: 100vh;
        height: 100vw;
        transform: translate(-50%, -50%) rotate(var(--rotation-angle, -90deg));
      }

      #background-switcher:focus-visible,
      .transport-control:focus-visible {
        outline: 2px solid rgba(255, 255, 255, 0.88);
        outline-offset: 0.2rem;
      }

      #music-stack {
        position: fixed;
        top: var(--page-gutter);
        left: var(--page-gutter);
        z-index: 5;
        width: min(44rem, calc(50vw - (var(--page-gutter) * 2)));
        display: grid;
        gap: 0.38rem;
        pointer-events: none;
      }

      #music-strip {
        position: relative;
        display: flex;
        align-items: center;
        gap: 0.8rem;
        width: 100%;
        pointer-events: auto;
        color: var(--strip-foreground);
        min-height: var(--strip-height);
        padding: 0.5rem 0.65rem 0.5rem 0.95rem;
        border: 1px solid rgba(var(--strip-foreground-rgb), 0.24);
        border-radius: 999px;
        background: linear-gradient(
          90deg,
          rgba(var(--strip-color-rgb), 0.94),
          rgba(var(--strip-color-rgb), 0.72)
        );
        box-shadow: 0 0.8rem 2rem rgba(0, 0, 0, 0.25);
        backdrop-filter: blur(14px);
        transition: background 220ms ease, border-color 220ms ease, color 220ms ease;
      }

      #transport-controls {
        flex: 0 0 auto;
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 0.32rem;
      }

      .transport-control {
        flex: 0 0 auto;
        border: 0;
        border-radius: 999px;
        display: grid;
        place-items: center;
        cursor: pointer;
        color: inherit;
        background: rgba(var(--strip-foreground-rgb), 0.16);
        transition: background-color 160ms ease, transform 160ms ease;
      }

      .transport-control:hover {
        background: rgba(var(--strip-foreground-rgb), 0.24);
      }

      .transport-control:active {
        transform: scale(0.97);
      }

      .transport-chip {
        min-width: 2.8rem;
        height: 2.15rem;
        padding: 0 0.72rem;
        font-size: 0.66rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      #player-toggle {
        width: 2.35rem;
        height: 2.35rem;
      }

      .player-icon {
        position: relative;
        display: block;
        width: 0.92rem;
        height: 0.92rem;
      }

      .player-icon::before,
      .player-icon::after {
        content: "";
        position: absolute;
        inset: 0;
        transition: all 160ms ease;
        background: currentColor;
      }

      #player-toggle:not(.is-playing) .player-icon::before {
        clip-path: polygon(18% 8%, 92% 50%, 18% 92%);
      }

      #player-toggle:not(.is-playing) .player-icon::after {
        opacity: 0;
      }

      #player-toggle.is-playing .player-icon::before,
      #player-toggle.is-playing .player-icon::after {
        width: 0.24rem;
        border-radius: 999px;
        clip-path: none;
        opacity: 1;
      }

      #player-toggle.is-playing .player-icon::before {
        left: 0.16rem;
      }

      #player-toggle.is-playing .player-icon::after {
        left: auto;
        right: 0.16rem;
      }

      #track-window {
        flex: 1 1 auto;
        width: 0;
        min-width: 0;
        overflow: hidden;
        position: relative;
      }

      #track-window::before,
      #track-window::after {
        content: "";
        position: absolute;
        top: 0;
        bottom: 0;
        width: 2.35rem;
        pointer-events: none;
        z-index: 1;
        transition: opacity 220ms ease;
      }

      #track-window::before {
        left: 0;
        opacity: 0;
        background: linear-gradient(
          90deg,
          rgba(var(--strip-color-rgb), 0.94),
          rgba(var(--strip-color-rgb), 0)
        );
      }

      #track-window::after {
        right: 0;
        background: linear-gradient(
          90deg,
          rgba(var(--strip-color-rgb), 0),
          rgba(var(--strip-color-rgb), 0.82)
        );
      }

      #track-window.is-scrolling::before {
        opacity: 1;
      }

      #track-marquee {
        display: flex;
        align-items: center;
        gap: 2.5rem;
        width: max-content;
        max-width: none;
        color: inherit;
        white-space: nowrap;
        will-change: transform;
      }

      #track-title,
      #track-title-clone {
        display: inline-block;
        font-size: clamp(0.85rem, 1.5vw, 1rem);
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      #track-title-clone {
        display: none;
      }

      #track-window.is-scrolling #track-title-clone {
        display: inline-block;
      }

      #track-window.is-scrolling #track-marquee {
        animation: marquee-scroll var(--scroll-duration) ease-in-out infinite;
      }

      #up-next-list {
        display: grid;
        gap: 0.34rem;
        pointer-events: none;
      }

      .up-next-item {
        display: flex;
        align-items: center;
        gap: 0.7rem;
        min-height: 2.45rem;
        padding: 0.5rem 0.95rem;
        border: 1px solid rgba(var(--strip-foreground-rgb), 0.16);
        border-radius: 999px;
        background: rgba(var(--strip-color-rgb), 0.5);
        color: var(--strip-foreground);
        backdrop-filter: blur(12px);
        box-shadow: 0 0.5rem 1.4rem rgba(0, 0, 0, 0.16);
        transition: background 220ms ease, border-color 220ms ease, color 220ms ease;
      }

      .up-next-item:nth-child(1) {
        opacity: 0.8;
      }

      .up-next-item:nth-child(2) {
        opacity: 0.68;
        transform: translateX(0.35rem);
      }

      .up-next-item:nth-child(3) {
        opacity: 0.56;
        transform: translateX(0.7rem);
      }

      .up-next-item:nth-child(4) {
        opacity: 0.44;
        transform: translateX(1.05rem);
      }

      .up-next-item:nth-child(5) {
        opacity: 0.32;
        transform: translateX(1.4rem);
      }

      .up-next-position {
        flex: 0 0 auto;
        min-width: 1.75rem;
        font-size: 0.68rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        opacity: 0.74;
      }

      .up-next-title {
        flex: 1 1 auto;
        min-width: 0;
        overflow: hidden;
        font-size: clamp(0.78rem, 1.35vw, 0.94rem);
        letter-spacing: 0.04em;
        text-overflow: ellipsis;
        text-transform: uppercase;
        white-space: nowrap;
      }

      #yt-player-shell {
        position: fixed;
        width: 240px;
        height: 240px;
        right: -260px;
        bottom: -260px;
        opacity: 0;
        pointer-events: none;
      }

      @keyframes marquee-scroll {
        0%,
        14% {
          transform: translateX(0);
        }

        86%,
        100% {
          transform: translateX(calc(-1 * var(--scroll-distance)));
        }
      }

      @media (prefers-reduced-motion: reduce) {
        #track-window.is-scrolling #track-marquee {
          animation: none;
        }
      }

      @media (max-width: 960px) {
        #music-stack {
          width: calc(100vw - (var(--page-gutter) * 2));
        }
      }

      @media (max-width: 640px) {
        #music-strip {
          padding-left: 0.78rem;
          padding-right: 0.52rem;
          gap: 0.55rem;
        }

        #transport-controls {
          gap: 0.24rem;
        }

        .transport-chip {
          min-width: 2.4rem;
          padding: 0 0.52rem;
          font-size: 0.6rem;
        }

        .up-next-item:nth-child(n) {
          transform: none;
        }
      }
    </style>
  </head>

      const backgroundSwitcher = document.getElementById("background-switcher");
      const backgroundImages = Array.from(document.querySelectorAll(".background-image"));
      const musicStrip = document.getElementById("music-strip");
      const playerToggle = document.getElementById("player-toggle");

      const trackTitle = document.getElementById("track-title");
      const trackTitleClone = document.getElementById("track-title-clone");

      const upNextTitles = Array.from(document.querySelectorAll(".up-next-title"));
      const imageRotations = {
        "1.jpg": "90deg",
      };
      const backgroundCache = new Map();
      const thumbnailColorCache = new Map();
      let activeBackgroundLayerIndex = -1;
      let backgroundRenderToken = 0;
      let currentImageIndex = 0;
      let currentTrackIndex = 0;
      let currentTrackVideoId = firstVideoId;
      let activeColorVideoId = "";
      let player;
      let playerReady = false;
      let isPlaying = false;
      let shouldPlayWhenReady = false;
      let hasQueuedPlaylist = false;
      let marqueeFrame = 0;
      let titleSyncInterval = 0;

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function preloadBackgroundImage(imagePath) {
        if (backgroundCache.has(imagePath)) {
          return backgroundCache.get(imagePath);
        }

        const request = new Promise((resolve, reject) => {
          const loader = new Image();

          loader.onload = () => resolve(loader);
          loader.onerror = reject;
          loader.src = encodeURI(imagePath);
        });

        backgroundCache.set(imagePath, request);
        return request;
      }

      function applyBackgroundImage(element, imagePath, loadedImage) {
        const rotationAngle = imageRotations[imagePath] || "-90deg";
        const shouldRotate = loadedImage.naturalHeight > loadedImage.naturalWidth;

        element.style.setProperty("--rotation-angle", rotationAngle);
        element.classList.toggle("is-rotated", shouldRotate);
        element.src = encodeURI(imagePath);
      }

      function rgbToLuminance(channel) {
        const normalized = channel / 255;

        if (normalized <= 0.03928) {
          return normalized / 12.92;
        }

        return ((normalized + 0.055) / 1.055) ** 2.4;
      }

      function setStripColor(color) {
        if (!color) {
          return;
        }

        const r = Math.round(clamp(color.r, 0, 255));
        const g = Math.round(clamp(color.g, 0, 255));
        const b = Math.round(clamp(color.b, 0, 255));
        const luminance =
          0.2126 * rgbToLuminance(r) +
          0.7152 * rgbToLuminance(g) +
          0.0722 * rgbToLuminance(b);
        const foregroundRgb = luminance > 0.46 ? "12, 17, 24" : "255, 255, 255";

        document.documentElement.style.setProperty("--strip-color-rgb", `${r}, ${g}, ${b}`);
        document.documentElement.style.setProperty("--strip-foreground-rgb", foregroundRgb);
      }

      function enhanceSampledColor(color) {
        const average = (color.r + color.g + color.b) / 3;
        const boost = 1.22;
        const adjusted = {
          r: average + (color.r - average) * boost,
          g: average + (color.g - average) * boost,
          b: average + (color.b - average) * boost,
        };
        const brightness = (adjusted.r + adjusted.g + adjusted.b) / 3;
        const targetBrightness = clamp(brightness, 76, 196) || 128;
        const brightnessScale = targetBrightness / Math.max(brightness, 1);

        return {
          r: clamp(adjusted.r * brightnessScale, 0, 255),
          g: clamp(adjusted.g * brightnessScale, 0, 255),
          b: clamp(adjusted.b * brightnessScale, 0, 255),
        };
      }

      function extractDominantColor(image) {
        const canvas = document.createElement("canvas");
        const context = canvas.getContext("2d", { willReadFrequently: true });

        if (!context) {
          return null;
        }

        const sampleSize = 24;
        canvas.width = sampleSize;
        canvas.height = sampleSize;
        context.drawImage(image, 0, 0, sampleSize, sampleSize);

        const pixels = context.getImageData(0, 0, sampleSize, sampleSize).data;
        let totalWeight = 0;
        let red = 0;
        let green = 0;
        let blue = 0;

        for (let index = 0; index < pixels.length; index += 4) {
          const r = pixels[index];
          const g = pixels[index + 1];
          const b = pixels[index + 2];
          const alpha = pixels[index + 3];
          const maxChannel = Math.max(r, g, b);
          const minChannel = Math.min(r, g, b);
          const brightness = (r + g + b) / 3;

          if (alpha < 180 || brightness < 18) {
            continue;
          }

          const saturation = maxChannel - minChannel;
          const weight = 0.45 + saturation / 255;

          red += r * weight;
          green += g * weight;
          blue += b * weight;
          totalWeight += weight;
        }

        if (!totalWeight) {
          return null;
        }

        return enhanceSampledColor({
          r: red / totalWeight,
          g: green / totalWeight,
          b: blue / totalWeight,
        });
      }

      function sampleThumbnailColor(videoId) {
        if (!videoId) {
          return Promise.resolve(null);
        }

        if (thumbnailColorCache.has(videoId)) {
          return Promise.resolve(thumbnailColorCache.get(videoId));
        }

        return new Promise((resolve) => {
          const image = new Image();

          image.crossOrigin = "anonymous";
          image.referrerPolicy = "no-referrer";
          image.onload = () => {
            let color = null;

            try {
              color = extractDominantColor(image);
            } catch (error) {
              color = null;
            }

            thumbnailColorCache.set(videoId, color);
            resolve(color);
          };
          image.onerror = () => {
            thumbnailColorCache.set(videoId, null);
            resolve(null);
          };
          image.src = `https://i.ytimg.com/vi/${videoId}/hqdefault.jpg`;
        });
      }

      async function updateStripColorForVideo(videoId) {
        if (!videoId || videoId === activeColorVideoId) {
          return;
        }

        activeColorVideoId = videoId;
        musicStrip.dataset.videoId = videoId;
        const sampledColor = await sampleThumbnailColor(videoId);

        if (!sampledColor || activeColorVideoId !== videoId) {
          return;
        }

        setStripColor(sampledColor);
      }

      function setTrackTitle(title) {
        trackTitle.textContent = title;
        trackTitleClone.textContent = title;
        window.cancelAnimationFrame(marqueeFrame);
        marqueeFrame = window.requestAnimationFrame(updateMarqueeState);
      }

      function getPlaylistLength() {
        if (playerReady && player && typeof player.getPlaylist === "function") {
          const playlist = player.getPlaylist();

          if (Array.isArray(playlist) && playlist.length) {
            return playlist.length;
          }
        }

        return fallbackTitles.length;
      }

      function normalizePlaylistIndex(index, playlistLength = getPlaylistLength()) {
        if (!playlistLength) {
          return 0;
        }

        return ((index % playlistLength) + playlistLength) % playlistLength;
      }

      function getTrackTitleAt(index) {
        const normalizedIndex = normalizePlaylistIndex(index, fallbackTitles.length);
        return fallbackTitles[normalizedIndex] || `Track ${normalizedIndex + 1}`;
      }

      function renderUpcomingTracks() {
        const playlistLength = getPlaylistLength();

        upNextTitles.forEach((titleNode, itemIndex) => {
          const upcomingIndex = normalizePlaylistIndex(currentTrackIndex + itemIndex + 1, playlistLength);

          upNextPositions[itemIndex].textContent = String(upcomingIndex + 1).padStart(2, "0");
          titleNode.textContent = getTrackTitleAt(upcomingIndex);
        });
      }

      function updateMarqueeState() {
        const overflowAmount = trackTitle.scrollWidth - trackWindow.clientWidth;
        const shouldScroll = overflowAmount > 0;

        trackWindow.classList.remove("is-scrolling");

        if (!shouldScroll) {
          return;
        }

        const gap = 54;
        const totalDistance = trackTitle.scrollWidth + gap;
        const duration = Math.max(16, totalDistance / 18);

        trackWindow.style.setProperty("--scroll-distance", `${totalDistance}px`);
        trackWindow.style.setProperty("--scroll-duration", `${duration}s`);
        trackWindow.classList.add("is-scrolling");
      }

      function updateToggleState() {
        playerToggle.classList.toggle("is-playing", isPlaying);
        playerToggle.setAttribute("aria-label", isPlaying ? "Pause playlist" : "Play playlist");
      }

      function syncTrackInfo() {
        if (!playerReady || !player) {
          return;
        }

        if (typeof player.getPlaylistIndex === "function") {
          const apiIndex = player.getPlaylistIndex();

          if (Number.isInteger(apiIndex) && apiIndex >= 0) {
            currentTrackIndex = apiIndex;
          }
        }

        let liveTitle = "";

        if (typeof player.getVideoData === "function") {
          const videoData = player.getVideoData();

          if (videoData && typeof videoData.title === "string") {
            liveTitle = videoData.title.trim();
          }

          if (videoData && typeof videoData.video_id === "string" && videoData.video_id.trim()) {
            currentTrackVideoId = videoData.video_id.trim();
            updateStripColorForVideo(currentTrackVideoId);
          }
        }

        setTrackTitle(liveTitle || getTrackTitleAt(currentTrackIndex));
        renderUpcomingTracks();
      }

      function queuePlaylist() {
        if (!playerReady || !player || hasQueuedPlaylist) {
          return;
        }

        if (typeof player.cuePlaylist === "function") {
          player.cuePlaylist({
            index: currentTrackIndex,
            list: playlistId,
            listType: "playlist",
          });
          hasQueuedPlaylist = true;
        }
      }

      async function renderBackground({ immediate = false } = {}) {
        const imagePath = images[currentImageIndex];
        const requestToken = ++backgroundRenderToken;

        try {
          const loadedImage = await preloadBackgroundImage(imagePath);

          if (requestToken !== backgroundRenderToken) {
            return;
          }

          const nextLayerIndex = activeBackgroundLayerIndex === 0 ? 1 : 0;
          const nextLayer = backgroundImages[nextLayerIndex];
          const currentLayer =
            activeBackgroundLayerIndex >= 0 ? backgroundImages[activeBackgroundLayerIndex] : null;

          applyBackgroundImage(nextLayer, imagePath, loadedImage);

          if (currentLayer && currentLayer !== nextLayer) {
            currentLayer.classList.remove("is-visible");
          }

          if (immediate) {
            nextLayer.style.transition = "none";
            nextLayer.classList.add("is-visible");
            window.requestAnimationFrame(() => {
              nextLayer.style.transition = "";
            });
          } else {
            nextLayer.classList.add("is-visible");
          }

          activeBackgroundLayerIndex = nextLayerIndex;
          backgroundSwitcher.setAttribute(
            "aria-label",
            `Show next background image. Current image ${currentImageIndex}`,
          );

          const nextImagePath = images[(currentImageIndex + 1) % images.length];
          void preloadBackgroundImage(nextImagePath);
        } catch (error) {
          // Keep the current image visible if the next one fails to load.
        }
      }

      function showNextBackground() {
        currentImageIndex = (currentImageIndex + 1) % images.length;
        void renderBackground();
      }

      function onPlayerReady(event) {
        playerReady = true;
        currentTrackIndex = 0;
        queuePlaylist();
        setTrackTitle(getTrackTitleAt(currentTrackIndex));
        renderUpcomingTracks();
        window.setTimeout(syncTrackInfo, 400);
        titleSyncInterval = window.setInterval(syncTrackInfo, 1500);

        if (shouldPlayWhenReady) {
          event.target.playVideo();
        }
      }

      function onPlayerStateChange(event) {
        if (!window.YT) {
          return;
        }

        if (event.data === window.YT.PlayerState.PLAYING) {
          isPlaying = true;
          syncTrackInfo();
        } else if (event.data === window.YT.PlayerState.BUFFERING) {
          syncTrackInfo();
        } else if (event.data === window.YT.PlayerState.PAUSED) {
          isPlaying = false;
        } else if (event.data === window.YT.PlayerState.CUED) {
          syncTrackInfo();
        } else if (event.data === window.YT.PlayerState.ENDED) {
          isPlaying = false;
          if (currentTrackIndex >= getPlaylistLength() - 1) {
            playTrackAt(0);
          } else {
            syncTrackInfo();
          }
        }

        updateToggleState();
      }

      function onAutoplayBlocked() {
        isPlaying = false;
        shouldPlayWhenReady = false;
        updateToggleState();
        setTrackTitle(getTrackTitleAt(currentTrackIndex));
        renderUpcomingTracks();
        updateStripColorForVideo(currentTrackVideoId);
      }

      function onPlayerError() {
        isPlaying = false;
        shouldPlayWhenReady = false;
        updateToggleState();
        setTrackTitle("Playlist unavailable right now");
      }

      function togglePlayback() {
        shouldPlayWhenReady = !isPlaying;

        if (!playerReady || !player) {
          loadYouTubeApi();
          return;
        }

        if (isPlaying) {
          shouldPlayWhenReady = false;
          player.pauseVideo();
          return;
        }

        player.playVideo();
      }

      function playTrackAt(index) {
        if (!playerReady || !player) {
          loadYouTubeApi();
          return;
        }

        const playlistLength = getPlaylistLength();
        currentTrackIndex = normalizePlaylistIndex(index, playlistLength);
        setTrackTitle(getTrackTitleAt(currentTrackIndex));
        renderUpcomingTracks();
        shouldPlayWhenReady = true;

        if (typeof player.playVideoAt === "function") {
          player.playVideoAt(currentTrackIndex);
          return;
        }

        if (typeof player.loadPlaylist === "function") {
          player.loadPlaylist({
            index: currentTrackIndex,
            list: playlistId,
            listType: "playlist",
          });
        }
      }

      function seekBy(seconds) {
        if (!playerReady || !player || typeof player.seekTo !== "function") {
          return;
        }

        const currentTime =
          typeof player.getCurrentTime === "function" ? player.getCurrentTime() : 0;
        const duration = typeof player.getDuration === "function" ? player.getDuration() : 0;
        const maxTime = duration > 0 ? duration : currentTime + Math.abs(seconds);
        const targetTime = clamp(currentTime + seconds, 0, maxTime);

        player.seekTo(targetTime, true);
      }

      function changeTrack(direction) {
        if (!playerReady || !player) {
          loadYouTubeApi();
          return;
        }

        const playlistLength = getPlaylistLength();
        const targetIndex = normalizePlaylistIndex(currentTrackIndex + direction, playlistLength);

        if (direction < 0 && currentTrackIndex === 0) {
          playTrackAt(playlistLength - 1);
          return;
        }

        if (direction > 0 && currentTrackIndex === playlistLength - 1) {
          playTrackAt(0);
          return;
        }

        currentTrackIndex = targetIndex;
        setTrackTitle(getTrackTitleAt(currentTrackIndex));
        renderUpcomingTracks();

        if (direction < 0 && typeof player.previousVideo === "function") {
          player.previousVideo();
          return;
        }

        if (direction > 0 && typeof player.nextVideo === "function") {
          player.nextVideo();
        }
      }

      function loadYouTubeApi() {
        if (window.YT && typeof window.YT.Player === "function") {
          window.onYouTubeIframeAPIReady();
          return;
        }

        if (document.querySelector('script[data-yt-api="true"]')) {
          return;
        }

        const apiScript = document.createElement("script");
        apiScript.src = "https://www.youtube.com/iframe_api";
        apiScript.async = true;
        apiScript.dataset.ytApi = "true";
        apiScript.addEventListener("error", onPlayerError);
        document.head.append(apiScript);
      }

      window.onYouTubeIframeAPIReady = function onYouTubeIframeAPIReady() {
        if (player) {
          return;
        }

        const playerVars = {
          controls: 0,
          list: playlistId,
          listType: "playlist",
          loop: 1,
          playsinline: 1,
          rel: 0,
        };

        if (window.location.protocol.startsWith("http")) {
          playerVars.origin = window.location.origin;
        }

        player = new window.YT.Player("yt-player", {
          width: "240",
          height: "240",
          videoId: firstVideoId,
          playerVars,
          events: {
            onAutoplayBlocked,
            onError: onPlayerError,
            onReady: onPlayerReady,
            onStateChange: onPlayerStateChange,
          },
        });
      };

      backgroundSwitcher.addEventListener("click", showNextBackground);
      backgroundSwitcher.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          showNextBackground();
        }
      });

      playerToggle.addEventListener("click", togglePlayback);
      previousTrackButton.addEventListener("click", () => changeTrack(-1));
      nextTrackButton.addEventListener("click", () => changeTrack(1));
      seekBackButton.addEventListener("click", () => seekBy(-10));
      seekForwardButton.addEventListener("click", () => seekBy(10));

      window.addEventListener("resize", () => {
        window.cancelAnimationFrame(marqueeFrame);
        marqueeFrame = window.requestAnimationFrame(updateMarqueeState);
      });

      void renderBackground({ immediate: true });
      setTrackTitle(getTrackTitleAt(currentTrackIndex));
      renderUpcomingTracks();
      updateStripColorForVideo(firstVideoId);
      loadYouTubeApi();
    </script>
  </body>
</html>
