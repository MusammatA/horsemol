<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>horsemol</title>
    <style>
      :root {
        font-family: "Trebuchet MS", "Gill Sans", sans-serif;
        color: #ffffff;
        background: #000000;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
      }

      #background-switcher {
        position: relative;
        width: 100%;
        min-height: 100vh;
        border: 0;
        padding: clamp(1.5rem, 4vw, 3rem);
        display: flex;
        align-items: flex-end;
        justify-content: flex-start;
        text-align: left;
        cursor: pointer;
        background-color: #111111;
        background-position: center;
        background-repeat: no-repeat;
        background-size: cover;
      }

      #background-switcher::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, rgba(5, 10, 18, 0.12), rgba(5, 10, 18, 0.7));
      }

      .panel {
        position: relative;
        z-index: 1;
        max-width: 26rem;
        padding: 1.1rem 1.25rem;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 1rem;
        background: rgba(12, 17, 25, 0.28);
        backdrop-filter: blur(8px);
      }

      h1 {
        margin: 0;
        font-size: clamp(2.4rem, 8vw, 5rem);
        line-height: 0.95;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      p,
      #image-label {
        margin: 0.75rem 0 0;
        font-size: 0.95rem;
        line-height: 1.5;
      }

      #image-label {
        display: inline-block;
        padding: 0.2rem 0.55rem;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.18);
      }
    </style>
  </head>
  <body>
    <button id="background-switcher" type="button" aria-label="Change background image">
      <div class="panel">
        <h1>horsemol</h1>
        <p>Click anywhere on the background to switch to the next photo.</p>
        <span id="image-label"></span>
      </div>
    </button>

    <script>
      const images = [
        "Altai Mountain 2.jpg",
        "Altai mountain 3.webp",
        "altai 4.jpg",
        "altai 5.jpg",
        "altai 6.jpg",
        "altai 7.jpg",
        "8.webp",
        "9.jpg",
        "10.jpg",
        "11.webp",
        "12.webp",
        "Altai Mountains.jpeg",
      ];

      const backgroundSwitcher = document.getElementById("background-switcher");
      const imageLabel = document.getElementById("image-label");
      let currentIndex = 0;

      function renderBackground() {
        const currentImage = images[currentIndex];

        backgroundSwitcher.style.backgroundImage = `url("${encodeURI(currentImage)}")`;
        backgroundSwitcher.setAttribute("aria-label", `Show next background image. Current image ${currentIndex}`);
        imageLabel.textContent = `Image ${currentIndex}`;
      }

      backgroundSwitcher.addEventListener("click", () => {
        currentIndex = (currentIndex + 1) % images.length;
        renderBackground();
      });

      renderBackground();
    </script>
  </body>
</html>
