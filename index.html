<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>horsemol</title>
    <style>
      :root {
        background: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        min-height: 100vh;
        background: #ffffff;
      }

      #background-switcher {
        display: block;
        width: 100vw;
        height: 100vh;
        border: 0;
        padding: 0;
        cursor: pointer;
        background: #ffffff;
        appearance: none;
      }

      #background-image {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
        object-position: center;
        background: #ffffff;
      }
    </style>
  </head>
  <body>
    <button id="background-switcher" type="button" aria-label="Change background image">
      <img id="background-image" alt="" />
    </button>

    <script>
      const images = [
        "1.webp",
        "2.jpg",
        "3.jpg",
        "4.jpg",
      ];

      const backgroundSwitcher = document.getElementById("background-switcher");
      const backgroundImage = document.getElementById("background-image");
      let currentIndex = 0;

      function renderBackground() {
        const currentImage = images[currentIndex];

        backgroundImage.src = encodeURI(currentImage);
        backgroundSwitcher.setAttribute("aria-label", `Show next background image. Current image ${currentIndex}`);
      }

      backgroundSwitcher.addEventListener("click", () => {
        currentIndex = (currentIndex + 1) % images.length;
        renderBackground();
      });

      renderBackground();
    </script>
  </body>
</html>
