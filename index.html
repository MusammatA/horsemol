      }

      function createStickyNoteId() {
        return `note-${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 8)}`;
      }

      function getFallbackNoteSize() {
        const baseSize = window.innerWidth <= 640 ? 142 : 160;
        const minimumWidth = Math.max(108, window.innerWidth - 24);
        const minimumHeight = Math.max(108, window.innerHeight - 24);

        return {
          width: Math.min(baseSize, minimumWidth),
          height: Math.min(baseSize, minimumHeight),
        };
      }

      function getMinimumStickyNoteSize() {
        const baseSize = window.innerWidth <= 640 ? 104 : 112;
        const minimumWidth = Math.max(80, window.innerWidth - 24);
        const minimumHeight = Math.max(80, window.innerHeight - 24);

        return {
          width: Math.min(baseSize, minimumWidth),
          height: Math.min(baseSize, minimumHeight),
        };
      }

      function getNoteSize(noteId) {
        const note = findStickyNote(noteId);
        const element = noteElements.get(noteId);

        if (note && Number.isFinite(note.width) && Number.isFinite(note.height)) {
          return { width: note.width, height: note.height };
        }

        if (element) {
          return {
            width: element.offsetWidth || getFallbackNoteSize().width,
            height: element.offsetHeight || getFallbackNoteSize().height,
          };
        }

        return getFallbackNoteSize();
      }

      function getMusicObstacleRect() {
        const rect = musicStack.getBoundingClientRect();
        const clearance = 12;

        return {
          left: Math.max(0, rect.left - clearance),
          top: Math.max(0, rect.top - clearance),
          right: Math.min(window.innerWidth, rect.right + clearance),
          bottom: Math.min(window.innerHeight, rect.bottom + clearance),
        };
      }

      function getTodoDockMetrics() {
        const rootFontSize = parseFloat(window.getComputedStyle(document.documentElement).fontSize) || 16;
        const horizontalInset = window.innerWidth <= 640 ? 7 * rootFontSize : 8.4 * rootFontSize;
        const minimumWidth = (window.innerWidth <= 640 ? 9 : 10) * rootFontSize;
        const maximumWidth = (window.innerWidth <= 640 ? 15.75 : 20.5) * rootFontSize;
        const maximumHeightInset = (window.innerWidth <= 640 ? 3.5 : 3.8) * rootFontSize;
        const stickyRect = stickyNoteTab.getBoundingClientRect();
        const pageGutter = Math.max(12, window.innerWidth - stickyRect.right);
        const preferredWidth = window.innerWidth - pageGutter * 2 - horizontalInset;
        const panelWidth = clamp(preferredWidth, minimumWidth, maximumWidth);
        const panelMaxHeight = Math.max(0, window.innerHeight - pageGutter * 2 - maximumHeightInset);
        const topGap = 0.58 * rootFontSize;

        return {
          pageGutter,
          panelMaxHeight,
          panelWidth,
          topGap,
        };
      }

      function updateTodoDockPosition() {
        const musicRect = musicStack.getBoundingClientRect();
        const stickyRect = stickyNoteTab.getBoundingClientRect();
        const { pageGutter, panelWidth } = getTodoDockMetrics();
        const minimumCenter = pageGutter + panelWidth / 2;
        const maximumCenter = window.innerWidth - pageGutter - panelWidth / 2;
        const desiredCenter = (musicRect.right + stickyRect.left) / 2;
        const fallbackCenter = window.innerWidth / 2;
        const centerX = clamp(
          Number.isFinite(desiredCenter) ? desiredCenter : fallbackCenter,
          minimumCenter,
          maximumCenter,
        );

        todoDock.style.left = `${centerX}px`;
      }

      function getTodoListObstacleRect() {
        const todoTabRect = todoTab.getBoundingClientRect();
        const dockRect = todoDock.getBoundingClientRect();
        const panelRect = todoListPanel.getBoundingClientRect();
        const { pageGutter, panelMaxHeight, panelWidth, topGap } = getTodoDockMetrics();
        const clearance = 12;
        const centerX = todoTabRect.left + todoTabRect.width / 2;
        const reservedTop = dockRect.bottom + topGap;
        const reservedBottom = Math.min(
          window.innerHeight,
          Math.max(panelRect.bottom, reservedTop + panelMaxHeight),
        );

        return {
          left: clamp(centerX - panelWidth / 2 - clearance, 0, window.innerWidth),
          top: clamp(reservedTop - clearance, 0, window.innerHeight),
          right: clamp(centerX + panelWidth / 2 + clearance, 0, window.innerWidth),
          bottom: clamp(reservedBottom + clearance, 0, window.innerHeight),
        };
      }

      function rectanglesIntersect(firstRect, secondRect) {
        return (
          firstRect.left < secondRect.right &&
          firstRect.right > secondRect.left &&
          firstRect.top < secondRect.bottom &&
          firstRect.bottom > secondRect.top
        );
      }

      function isStickyNotePositionClear(x, y, width, height, obstacleRects) {
        const noteRect = {
          left: x,
          top: y,
          right: x + width,
          bottom: y + height,
        };

        return obstacleRects.every((obstacleRect) => !rectanglesIntersect(noteRect, obstacleRect));
      }

      function clampStickyNotePosition(x, y, width, height, margin) {
        return {
          x: clamp(x, margin, Math.max(margin, window.innerWidth - width - margin)),
          y: clamp(y, margin, Math.max(margin, window.innerHeight - height - margin)),
        };
      }

      function resolveStickyNotePosition(x, y, width, height) {
        const margin = 12;
        const obstacleRects = [getMusicObstacleRect(), getTodoListObstacleRect()];
        const clampedPosition = clampStickyNotePosition(x, y, width, height, margin);

        if (isStickyNotePositionClear(clampedPosition.x, clampedPosition.y, width, height, obstacleRects)) {
          return clampedPosition;
        }

        const candidatePositions = [];

        obstacleRects.forEach((obstacleRect) => {
          candidatePositions.push(
            { x: clampedPosition.x, y: obstacleRect.bottom + margin },
            { x: obstacleRect.right + margin, y: clampedPosition.y },
            { x: obstacleRect.left - width - margin, y: clampedPosition.y },
            { x: clampedPosition.x, y: obstacleRect.top - height - margin },
            { x: obstacleRect.left - width - margin, y: obstacleRect.bottom + margin },
            { x: obstacleRect.right + margin, y: obstacleRect.bottom + margin },
            { x: obstacleRect.left - width - margin, y: obstacleRect.top - height - margin },
            { x: obstacleRect.right + margin, y: obstacleRect.top - height - margin },
          );
        });

        const seenPositions = new Set();
        const viablePositions = candidatePositions
          .map((candidatePosition) => clampStickyNotePosition(candidatePosition.x, candidatePosition.y, width, height, margin))
          .filter((candidatePosition) => {
            const positionKey = `${Math.round(candidatePosition.x)}:${Math.round(candidatePosition.y)}`;

            if (seenPositions.has(positionKey)) {
              return false;
            }

            seenPositions.add(positionKey);
            return isStickyNotePositionClear(candidatePosition.x, candidatePosition.y, width, height, obstacleRects);
          });

        if (!viablePositions.length) {
          return clampedPosition;
        }

        return viablePositions.reduce((bestPosition, candidatePosition) => {
          const bestDistance = Math.hypot(bestPosition.x - clampedPosition.x, bestPosition.y - clampedPosition.y);
          const candidateDistance = Math.hypot(
            candidatePosition.x - clampedPosition.x,
            candidatePosition.y - clampedPosition.y,
          );

          return candidateDistance < bestDistance ? candidatePosition : bestPosition;
        });
      }

      function findStickyNote(noteId) {
        return stickyNotes.find((note) => note.id === noteId) || null;
      }

      function normalizeStickyNoteLayout(note) {
        const margin = 12;
        const minimumSize = getMinimumStickyNoteSize();
        const defaultSize = getFallbackNoteSize();
        const maxX = Math.max(margin, window.innerWidth - minimumSize.width - margin);
        const maxY = Math.max(margin, window.innerHeight - minimumSize.height - margin);
        const startingWidth = Number.isFinite(note.width) ? note.width : defaultSize.width;
        const startingHeight = Number.isFinite(note.height) ? note.height : defaultSize.height;

        note.x = clamp(Number.isFinite(note.x) ? note.x : margin, margin, maxX);
        note.y = clamp(Number.isFinite(note.y) ? note.y : margin, margin, maxY);

        const initialMaxWidth = Math.max(minimumSize.width, window.innerWidth - note.x - margin);
        const initialMaxHeight = Math.max(minimumSize.height, window.innerHeight - note.y - margin);

        note.width = clamp(startingWidth, minimumSize.width, initialMaxWidth);
        note.height = clamp(startingHeight, minimumSize.height, initialMaxHeight);

        const resolvedPosition = resolveStickyNotePosition(note.x, note.y, note.width, note.height);

        note.x = resolvedPosition.x;
        note.y = resolvedPosition.y;

        const resolvedMaxWidth = Math.max(minimumSize.width, window.innerWidth - note.x - margin);
        const resolvedMaxHeight = Math.max(minimumSize.height, window.innerHeight - note.y - margin);

        note.width = clamp(note.width, minimumSize.width, resolvedMaxWidth);
        note.height = clamp(note.height, minimumSize.height, resolvedMaxHeight);
      }

      function persistStickyNotes() {
        try {
          const serializableNotes = stickyNotes.map((note) => ({
            id: note.id,
            title: note.title,
            body: note.body,
            color: note.color,
            x: note.x,
            y: note.y,
            width: note.width,
            height: note.height,
          }));

          window.localStorage.setItem(stickyNoteStorageKey, JSON.stringify(serializableNotes));
        } catch (error) {
          // Ignore storage failures and keep note state in memory.
        }
      }

      function getDisplayedStickyNoteTitle(note) {
        return note.title.trim() || "Untitled note";
      }

      function getDisplayedStickyNoteBody(note) {
        return note.body.trim() || "Tap to write";
      }

      function updateStickyNoteZIndices() {
        stickyNotes.forEach((note, index) => {
          const element = noteElements.get(note.id);

          if (element) {
            element.style.zIndex = String(index + 1);
          }
        });
      }

      function deleteStickyNote(noteId) {
        const noteIndex = stickyNotes.findIndex((note) => note.id === noteId);

        if (noteIndex < 0) {
          return;
        }

        if (activeNoteId === noteId) {
          setStickyNoteEditorClosed();
        }

        if (noteDragState && noteDragState.noteId === noteId) {
          stopStickyNoteInteraction();
        }

        stickyNotes.splice(noteIndex, 1);

        const element = noteElements.get(noteId);

        if (element) {
          element.remove();
          noteElements.delete(noteId);
        }

        updateStickyNoteZIndices();
        persistStickyNotes();
      }

      function syncStickyNoteElement(note) {
        let element = noteElements.get(note.id);

        if (!element) {
          element = document.createElement("div");
          element.className = "sticky-note-card";
          element.dataset.id = note.id;
          element.tabIndex = 0;
          element.setAttribute("role", "button");
          element.innerHTML =
            '<button class="sticky-note-delete" type="button" aria-label="Delete sticky note">×</button><span class="sticky-note-card-title"></span><span class="sticky-note-card-body"></span><span class="sticky-note-resize-handle" aria-hidden="true"></span>';
          element.addEventListener("pointerdown", onStickyNotePointerDown);
          element.addEventListener("keydown", onStickyNoteKeyDown);
          element.querySelector(".sticky-note-delete").addEventListener("click", onStickyNoteDeleteClick);
          notesCanvas.append(element);
          noteElements.set(note.id, element);
        }

        const titleElement = element.querySelector(".sticky-note-card-title");
        const bodyElement = element.querySelector(".sticky-note-card-body");
        const displayedBody = getDisplayedStickyNoteBody(note);
        const isBodyPlaceholder = !note.body.trim();

        element.dataset.color = stickyNoteColors.includes(note.color) ? note.color : "yellow";
        element.style.left = `${note.x}px`;
        element.style.top = `${note.y}px`;
        element.style.width = `${note.width}px`;
        element.style.height = `${note.height}px`;
        element.setAttribute("aria-label", `Open sticky note ${getDisplayedStickyNoteTitle(note)}`);
        titleElement.textContent = getDisplayedStickyNoteTitle(note);
        bodyElement.textContent = displayedBody;
        bodyElement.classList.toggle("is-placeholder", isBodyPlaceholder);
        updateStickyNoteZIndices();
      }

      function syncStickyNoteSwatches(color) {
        noteEditor.dataset.color = color;
        noteSwatches.forEach((swatch) => {
          swatch.classList.toggle("is-selected", swatch.dataset.color === color);
        });
      }

      function syncActiveStickyNoteFromEditor() {
        if (!activeNoteId) {
          return;
        }

        const note = findStickyNote(activeNoteId);

        if (!note) {
          return;
        }

        note.title = noteTitleInput.value;
        note.body = noteBodyInput.value;
        if (note.title.trim() || note.body.trim()) {
          promptGuestToSaveWork();
        }
        note.color = stickyNoteColors.includes(noteEditor.dataset.color) ? noteEditor.dataset.color : "yellow";
        syncStickyNoteElement(note);
        persistStickyNotes();
      }

      function onStickyNoteEditorBeforeInput(event) {
        if (event.inputType === "historyRedo" || event.inputType === "historyUndo") {
          return;
        }

        if (shouldPromptForGuestSave(event.inputType)) {
          promptGuestToSaveWork();
        }
        captureUndoSnapshot();
      }

      function openStickyNoteEditor(noteId, { focus = true } = {}) {
        const note = findStickyNote(noteId);

        if (!note) {
          return;
        }

        activeNoteId = noteId;
        noteTitleInput.value = note.title;
        noteBodyInput.value = note.body;
        syncStickyNoteSwatches(stickyNoteColors.includes(note.color) ? note.color : "yellow");
        noteEditorBackdrop.classList.add("is-open");
        noteEditorBackdrop.setAttribute("aria-hidden", "false");
        syncBackgroundWaveState();
        if (focus) {
          window.requestAnimationFrame(() => {
            noteTitleInput.focus({ preventScroll: true });
          });
        }
      }

      function closeStickyNoteEditor() {
        syncActiveStickyNoteFromEditor();
        setStickyNoteEditorClosed();
      }

      function moveStickyNoteToFront(noteId) {
        const noteIndex = stickyNotes.findIndex((note) => note.id === noteId);

        if (noteIndex < 0 || noteIndex === stickyNotes.length - 1) {
          return;
        }

        const [note] = stickyNotes.splice(noteIndex, 1);

        stickyNotes.push(note);
        updateStickyNoteZIndices();
      }

      function createStickyNoteAtPointer(clientX, clientY) {
        const noteSize = getFallbackNoteSize();
        const note = {
          id: createStickyNoteId(),
          title: `Sticky Note ${nextStickyNoteNumber}`,
          body: "",
          color: "yellow",
          x: clientX,
          y: clientY,
          width: noteSize.width,
          height: noteSize.height,
        };

        nextStickyNoteNumber += 1;
        stickyNotes.push(note);
        note.x = clientX - note.width / 2;
        note.y = clientY - note.height / 2;
        normalizeStickyNoteLayout(note);
        syncStickyNoteElement(note);
        persistStickyNotes();

        return note;
      }

      function startStickyNoteDrag(noteId, pointerId, clientX, clientY, fromLauncher = false) {
        const note = findStickyNote(noteId);
        const noteElement = noteElements.get(noteId);

        if (!note || !noteElement) {
          return;
        }

        const undoSnapshot = fromLauncher ? null : buildUndoSnapshot();

        moveStickyNoteToFront(noteId);

        const noteRect = noteElement.getBoundingClientRect();

        noteDragState = {
          noteId,
          pointerId,
          mode: "drag",
          capturedUndo: Boolean(fromLauncher),
          fromLauncher,
          moved: false,
          undoSnapshot,
          startPointerX: clientX,
          startPointerY: clientY,
          offsetX: fromLauncher ? noteRect.width / 2 : clientX - noteRect.left,
          offsetY: fromLauncher ? noteRect.height / 2 : clientY - noteRect.top,
        };

        noteElement.classList.add("is-dragging");
      }

      function startStickyNoteResize(noteId, pointerId, clientX, clientY) {
        const note = findStickyNote(noteId);
        const noteElement = noteElements.get(noteId);

        if (!note || !noteElement) {
          return;
        }

        const undoSnapshot = buildUndoSnapshot();

        moveStickyNoteToFront(noteId);

        const noteSize = getNoteSize(noteId);

        noteDragState = {
          noteId,
          pointerId,
          mode: "resize",
          capturedUndo: false,
          fromLauncher: false,
          moved: false,
          undoSnapshot,
          startPointerX: clientX,
          startPointerY: clientY,
          startWidth: noteSize.width,
          startHeight: noteSize.height,
        };

        noteElement.classList.add("is-resizing");
      }

      function stopStickyNoteDrag(pointerId) {
        if (!noteDragState || pointerId !== noteDragState.pointerId) {
          return;
        }

        const finishedDragState = noteDragState;
        const note = findStickyNote(finishedDragState.noteId);
        const noteElement = noteElements.get(finishedDragState.noteId);

        if (noteElement) {
          noteElement.classList.remove("is-dragging");
          noteElement.classList.remove("is-resizing");
        }

        if (note) {
          normalizeStickyNoteLayout(note);
          syncStickyNoteElement(note);
          persistStickyNotes();
        }

        noteDragState = null;

        if (
          finishedDragState.mode === "drag" &&
          !finishedDragState.moved &&
          !finishedDragState.fromLauncher
        ) {
          openStickyNoteEditor(finishedDragState.noteId);
        }
      }

      function onStickyNotePointerMove(event) {
        if (!noteDragState || event.pointerId !== noteDragState.pointerId) {
          return;
        }

        const note = findStickyNote(noteDragState.noteId);

        if (!note) {
          return;
        }

        if (
          !noteDragState.moved &&
          (noteDragState.fromLauncher ||
            Math.hypot(event.clientX - noteDragState.startPointerX, event.clientY - noteDragState.startPointerY) > 5)
        ) {
          noteDragState.moved = true;
        }

        if (!noteDragState.moved) {
          return;
        }

        if (!noteDragState.capturedUndo && !noteDragState.fromLauncher) {
          pushUndoSnapshot(noteDragState.undoSnapshot);
          noteDragState.capturedUndo = true;
        }

        if (noteDragState.mode === "resize") {
          note.width = noteDragState.startWidth + (event.clientX - noteDragState.startPointerX);
          note.height = noteDragState.startHeight + (event.clientY - noteDragState.startPointerY);
          normalizeStickyNoteLayout(note);
          syncStickyNoteElement(note);
          return;
        }

        note.x = event.clientX - noteDragState.offsetX;
        note.y = event.clientY - noteDragState.offsetY;
        normalizeStickyNoteLayout(note);
        syncStickyNoteElement(note);
      }

      function onStickyNotePointerUp(event) {
        stopStickyNoteDrag(event.pointerId);
      }

      function onStickyNotePointerDown(event) {
        if (event.button !== 0) {
          return;
        }

        const noteElement = event.currentTarget;
        const noteId = noteElement.dataset.id;
        const deleteButton = event.target.closest(".sticky-note-delete");
        const resizeHandle = event.target.closest(".sticky-note-resize-handle");

        if (deleteButton) {
          event.stopPropagation();
          return;
        }

        if (resizeHandle) {
          event.preventDefault();
          event.stopPropagation();
          startStickyNoteResize(noteId, event.pointerId, event.clientX, event.clientY);
          return;
        }

        event.preventDefault();
        event.stopPropagation();
        startStickyNoteDrag(noteId, event.pointerId, event.clientX, event.clientY);
      }

      function onStickyNoteKeyDown(event) {
        if (event.target !== event.currentTarget) {
          return;
        }

        if (event.key !== "Enter" && event.key !== " ") {
          return;
        }

        event.preventDefault();
        openStickyNoteEditor(event.currentTarget.dataset.id);
      }

      function onStickyNoteDeleteClick(event) {
        const noteElement = event.currentTarget.closest(".sticky-note-card");

        if (!noteElement) {
          return;
        }

        event.preventDefault();
        event.stopPropagation();
        captureUndoSnapshot();
        deleteStickyNote(noteElement.dataset.id);
      }

      function onStickyNoteTabPointerDown(event) {
        if (event.button !== 0) {
          return;
        }

        event.preventDefault();
        event.stopPropagation();
        captureUndoSnapshot();

        if (activeNoteId) {
          closeStickyNoteEditor();
        }

        const note = createStickyNoteAtPointer(event.clientX, event.clientY);

        startStickyNoteDrag(note.id, event.pointerId, event.clientX, event.clientY, true);
      }

      function loadStickyNotes() {
        try {
          const storedNotes = JSON.parse(window.localStorage.getItem(stickyNoteStorageKey) || "[]");

          if (!Array.isArray(storedNotes)) {
            return;
          }

          stickyNotes = storedNotes
            .map((note) => ({
              id: typeof note.id === "string" ? note.id : createStickyNoteId(),
              title: typeof note.title === "string" ? note.title : "",
              body: typeof note.body === "string" ? note.body : "",
              color: stickyNoteColors.includes(note.color) ? note.color : "yellow",
              x: Number.isFinite(note.x) ? note.x : 24,
              y: Number.isFinite(note.y) ? note.y : 24,
              width: Number.isFinite(note.width) ? note.width : getFallbackNoteSize().width,
              height: Number.isFinite(note.height) ? note.height : getFallbackNoteSize().height,
            }))
            .filter((note) => note.id);
          nextStickyNoteNumber = stickyNotes.length + 1;
          syncStickyNotesState();
          persistStickyNotes();
          window.requestAnimationFrame(reflowStickyNotes);
        } catch (error) {
          stickyNotes = [];
          nextStickyNoteNumber = 1;
        }
      }

      function reflowStickyNotes() {
        stickyNotes.forEach((note) => {
          normalizeStickyNoteLayout(note);
          syncStickyNoteElement(note);
        });
        persistStickyNotes();
      }

      function rgbToLuminance(channel) {
        const normalized = channel / 255;

        if (normalized <= 0.03928) {
          return normalized / 12.92;
        }

        return ((normalized + 0.055) / 1.055) ** 2.4;
      }

      function setStripColor(color) {
        if (!color) {
          return;
        }

        const r = Math.round(clamp(color.r, 0, 255));
        const g = Math.round(clamp(color.g, 0, 255));
        const b = Math.round(clamp(color.b, 0, 255));
        const luminance =
          0.2126 * rgbToLuminance(r) +
          0.7152 * rgbToLuminance(g) +
          0.0722 * rgbToLuminance(b);
        const foregroundRgb = luminance > 0.46 ? "12, 17, 24" : "255, 255, 255";

        document.documentElement.style.setProperty("--strip-color-rgb", `${r}, ${g}, ${b}`);
        document.documentElement.style.setProperty("--strip-foreground-rgb", foregroundRgb);
      }

      function enhanceSampledColor(color) {
        const average = (color.r + color.g + color.b) / 3;
        const boost = 1.22;
        const adjusted = {
          r: average + (color.r - average) * boost,
          g: average + (color.g - average) * boost,
          b: average + (color.b - average) * boost,
        };
        const brightness = (adjusted.r + adjusted.g + adjusted.b) / 3;
        const targetBrightness = clamp(brightness, 76, 196) || 128;
        const brightnessScale = targetBrightness / Math.max(brightness, 1);

        return {
          r: clamp(adjusted.r * brightnessScale, 0, 255),
          g: clamp(adjusted.g * brightnessScale, 0, 255),
          b: clamp(adjusted.b * brightnessScale, 0, 255),
        };
      }

      function extractDominantColor(image) {
        const canvas = document.createElement("canvas");
        const context = canvas.getContext("2d", { willReadFrequently: true });

        if (!context) {
          return null;
        }

        const sampleSize = 24;
        canvas.width = sampleSize;
        canvas.height = sampleSize;
        context.drawImage(image, 0, 0, sampleSize, sampleSize);

        const pixels = context.getImageData(0, 0, sampleSize, sampleSize).data;
        let totalWeight = 0;
        let red = 0;
        let green = 0;
        let blue = 0;

        for (let index = 0; index < pixels.length; index += 4) {
          const r = pixels[index];
          const g = pixels[index + 1];
          const b = pixels[index + 2];
          const alpha = pixels[index + 3];
          const maxChannel = Math.max(r, g, b);
          const minChannel = Math.min(r, g, b);
          const brightness = (r + g + b) / 3;

          if (alpha < 180 || brightness < 18) {
            continue;
          }

          const saturation = maxChannel - minChannel;
          const weight = 0.45 + saturation / 255;

          red += r * weight;
          green += g * weight;
          blue += b * weight;
          totalWeight += weight;
        }

        if (!totalWeight) {
          return null;
        }

        return enhanceSampledColor({
          r: red / totalWeight,
          g: green / totalWeight,
          b: blue / totalWeight,
        });
      }

      function sampleThumbnailColor(videoId) {
        if (!videoId) {
          return Promise.resolve(null);
        }

        if (thumbnailColorCache.has(videoId)) {
          return Promise.resolve(thumbnailColorCache.get(videoId));
        }

        return new Promise((resolve) => {
          const image = new Image();

          image.crossOrigin = "anonymous";
          image.referrerPolicy = "no-referrer";
          image.onload = () => {
            let color = null;

            try {
              color = extractDominantColor(image);
            } catch (error) {
              color = null;
            }

            thumbnailColorCache.set(videoId, color);
            resolve(color);
          };
          image.onerror = () => {
            thumbnailColorCache.set(videoId, null);
            resolve(null);
          };
          image.src = `https://i.ytimg.com/vi/${videoId}/hqdefault.jpg`;
        });
      }

      async function updateStripColorForVideo(videoId) {
        if (!videoId || videoId === activeColorVideoId) {
          return;
        }

        activeColorVideoId = videoId;
        musicStrip.dataset.videoId = videoId;
        const sampledColor = await sampleThumbnailColor(videoId);

        if (!sampledColor || activeColorVideoId !== videoId) {
          return;
        }

        setStripColor(sampledColor);
      }

      function setTrackTitle(title) {
        trackTitle.textContent = title;
        trackTitleClone.textContent = title;
        window.cancelAnimationFrame(marqueeFrame);
        marqueeFrame = window.requestAnimationFrame(updateMarqueeState);
      }

      function getPlaylistLength() {
        return playlistTracks.length;
      }

      function normalizePlaylistIndex(index, playlistLength = getPlaylistLength()) {
        if (!playlistLength) {
          return 0;
        }

        return ((index % playlistLength) + playlistLength) % playlistLength;
      }

      function getTrackAt(index) {
        const normalizedIndex = normalizePlaylistIndex(index, playlistTracks.length);

        return (
          playlistTracks[normalizedIndex] || {
            title: `Track ${normalizedIndex + 1}`,
            videoId: "",
          }
        );
      }

      function getTrackTitleAt(index) {
        return getTrackAt(index).title;
      }

      function getTrackIndexByVideoId(videoId) {
        if (!videoId) {
          return -1;
        }

        return playlistTracks.findIndex((track) => track.videoId === videoId);
      }

      function syncSelectedTrackUi() {
        const track = getTrackAt(currentTrackIndex);

        currentTrackVideoId = track.videoId;
        setTrackTitle(track.title);
        renderUpcomingTracks();
        updateStripColorForVideo(track.videoId);
      }

      function startPlayerPlayback(startCommand, commandLabel, track) {
        if (!player || typeof startCommand !== "function") {
          return;
        }

        updatePlayerDebug({
          command: commandLabel,
          requestedTrackTitle: track?.title || getTrackTitleAt(currentTrackIndex),
          requestedVideoId: track?.videoId || currentTrackVideoId,
        });
        startCommand();
      }

      function syncPlayerTrackSelection({ play = false, force = false } = {}) {
        const track = getTrackAt(currentTrackIndex);

        currentTrackVideoId = track.videoId;
        updatePlayerDebug({
          action: "syncPlayerTrackSelection",
          force,
          play,
          requestedTrackTitle: track.title,
          requestedVideoId: track.videoId,
        });
        syncSelectedTrackUi();

        if (!playerReady || !player || !track.videoId) {
          return;
        }

        const currentVideoId =
          typeof player.getVideoData === "function" &&
          player.getVideoData() &&
          typeof player.getVideoData().video_id === "string"
            ? player.getVideoData().video_id.trim()
            : "";
        const shouldLoadTrack = force || currentVideoId !== track.videoId;

        if (shouldLoadTrack) {
          if (play && typeof player.loadVideoById === "function") {
            startPlayerPlayback(() => {
              player.loadVideoById(track.videoId, 0);
            }, "loadVideoById", track);
            return;
          }

          if (typeof player.cueVideoById === "function") {
            startPlayerPlayback(() => {
              player.cueVideoById(track.videoId, 0);
            }, "cueVideoById", track);
            return;
          }
        }

        if (play && typeof player.playVideo === "function") {
          startPlayerPlayback(() => {
            player.playVideo();
          }, "playVideo", track);
        }
      }

      function renderUpcomingTracks() {
        const playlistLength = getPlaylistLength();
        const upcomingTracksFragment = document.createDocumentFragment();

        if (!playlistLength || playlistLength === 1) {
          upNextList.replaceChildren();
          return;
        }

        for (let offset = 1; offset < playlistLength; offset += 1) {
          const upcomingIndex = normalizePlaylistIndex(currentTrackIndex + offset, playlistLength);
          const upcomingItem = document.createElement("div");
          const upcomingPosition = document.createElement("span");
          const upcomingTitle = document.createElement("span");

          upcomingItem.className = "up-next-item";
          upcomingItem.setAttribute("role", "listitem");

          if (offset <= 5) {
            upcomingItem.classList.add(`depth-${offset}`);
          }

          upcomingPosition.className = "up-next-position";
          upcomingPosition.textContent = String(upcomingIndex + 1).padStart(2, "0");

          upcomingTitle.className = "up-next-title";
          upcomingTitle.textContent = getTrackTitleAt(upcomingIndex);

          upcomingItem.append(upcomingPosition, upcomingTitle);
          upcomingTracksFragment.append(upcomingItem);
        }

        upNextList.replaceChildren(upcomingTracksFragment);
        upNextList.scrollTop = 0;
      }

      function updateMarqueeState() {
        const overflowAmount = trackTitle.scrollWidth - trackWindow.clientWidth;
        const shouldScroll = overflowAmount > 0;

        trackWindow.classList.remove("is-scrolling");

        if (!shouldScroll) {
          return;
        }

        const gap = 54;
        const totalDistance = trackTitle.scrollWidth + gap;
        const duration = Math.max(16, totalDistance / 18);

        trackWindow.style.setProperty("--scroll-distance", `${totalDistance}px`);
        trackWindow.style.setProperty("--scroll-duration", `${duration}s`);
        trackWindow.classList.add("is-scrolling");
      }

      function updateToggleState() {
        if (isPlaying) {
          playerToggle.classList.add("is-playing");
        } else {
          playerToggle.classList.remove("is-playing");
        }

        playerToggle.setAttribute("aria-label", isPlaying ? "Pause playlist" : "Play playlist");
        document.documentElement.dataset.playerToggleClass = playerToggle.className;
        document.documentElement.dataset.playerToggleAria = playerToggle.getAttribute("aria-label");
      }

      function syncTrackInfo() {
        if (!playerReady || !player) {
          return;
        }

        let liveTitle = "";

        if (typeof player.getVideoData === "function") {
          const videoData = player.getVideoData();

          if (videoData && typeof videoData.title === "string") {
            liveTitle = videoData.title.trim();
          }

          if (videoData && typeof videoData.video_id === "string" && videoData.video_id.trim()) {
            currentTrackVideoId = videoData.video_id.trim();
            const matchedTrackIndex = getTrackIndexByVideoId(currentTrackVideoId);

            if (matchedTrackIndex >= 0) {
              currentTrackIndex = matchedTrackIndex;
            }

            updateStripColorForVideo(currentTrackVideoId);
          }
        }

        setTrackTitle(liveTitle || getTrackTitleAt(currentTrackIndex));
        renderUpcomingTracks();
      }

      async function renderBackground({ immediate = false } = {}) {
        const imagePath = images[currentImageIndex];
        const requestToken = ++backgroundRenderToken;

        try {
          const loadedImage = await preloadBackgroundImage(imagePath);

          if (requestToken !== backgroundRenderToken) {
            return;
          }

          const nextLayerIndex = activeBackgroundLayerIndex === 0 ? 1 : 0;
          const nextLayer = backgroundImages[nextLayerIndex];
          const currentLayer =
            activeBackgroundLayerIndex >= 0 ? backgroundImages[activeBackgroundLayerIndex] : null;

          applyBackgroundImage(nextLayer, imagePath, loadedImage);

          if (currentLayer && currentLayer !== nextLayer) {
            currentLayer.classList.remove("is-visible");
          }

          if (immediate) {
            nextLayer.style.transition = "none";
            nextLayer.classList.add("is-visible");
            window.requestAnimationFrame(() => {
              nextLayer.style.transition = "";
            });
          } else {
            nextLayer.classList.add("is-visible");
          }

          activeBackgroundLayerIndex = nextLayerIndex;
          backgroundSwitcher.setAttribute(
            "aria-label",
            `Show next background image. Current image ${currentImageIndex}`,
          );

          const nextImagePath = images[(currentImageIndex + 1) % images.length];
          void preloadBackgroundImage(nextImagePath);
        } catch (error) {
          // Keep the current image visible if the next one fails to load.
        }
      }

      function showNextBackground() {
        currentImageIndex = (currentImageIndex + 1) % images.length;
        void renderBackground();
      }

      function showNextBackgroundWithUndoCapture() {
        captureUndoSnapshot();
        showNextBackground();
      }

      function onPlayerReady(event) {
        playerReady = true;
        updatePlayerDebug({
          event: "onPlayerReady",
        });

        syncSelectedTrackUi();

        if (!shouldPlayWhenReady) {
          syncPlayerTrackSelection({ play: false, force: true });
        }

        window.setTimeout(syncTrackInfo, 400);
        titleSyncInterval = window.setInterval(syncTrackInfo, 1500);
      }

      function onPlayerStateChange(event) {
        if (!window.YT) {
          return;
        }

        updatePlayerDebug({
          event: "onPlayerStateChange",
          playerState: event.data,
        });

        if (event.data === window.YT.PlayerState.PLAYING) {
          isPlaying = true;
          playerNeedsManualStart = false;
          updatePlayerUnlockUi();
          syncTrackInfo();
        } else if (event.data === window.YT.PlayerState.BUFFERING) {
          syncTrackInfo();
        } else if (event.data === window.YT.PlayerState.PAUSED) {
          isPlaying = false;
        } else if (event.data === window.YT.PlayerState.CUED) {
          syncTrackInfo();
        } else if (event.data === window.YT.PlayerState.ENDED) {
          isPlaying = false;
          playTrackAt(currentTrackIndex + 1);
        }

        updateToggleState();
      }

      function onAutoplayBlocked() {
        isPlaying = false;
        shouldPlayWhenReady = false;
        playerNeedsManualStart = true;
        updatePlayerDebug({
          event: "onAutoplayBlocked",
        });
        updatePlayerUnlockUi();
        updateToggleState();
        syncPlayerTrackSelection({ play: false });
      }

      function onPlayerError(event) {
        isPlaying = false;
        shouldPlayWhenReady = false;
        playerNeedsManualStart = false;
        updatePlayerDebug({
          errorCode: event && typeof event.data !== "undefined" ? event.data : null,
          event: "onPlayerError",
        });
        updatePlayerUnlockUi();
        updateToggleState();
        setTrackTitle("Playlist unavailable right now");
      }

      function togglePlayback() {
        updatePlayerDebug({
          action: "togglePlayback",
        });
        playerNeedsManualStart = false;
        updatePlayerUnlockUi();

        if (!player) {
          playerCreationRequested = true;
          shouldPlayWhenReady = true;

          if (window.YT && typeof window.YT.Player === "function") {
            createYouTubePlayer({ autoplay: true });
            return;
          }

          loadYouTubeApi();
          return;
        }

        if (!playerReady) {
          shouldPlayWhenReady = true;
          return;
        }

        if (isPlaying) {
          shouldPlayWhenReady = false;
          updatePlayerDebug({
            command: "pauseVideo",
          });
          player.pauseVideo();
          return;
        }

        shouldPlayWhenReady = true;
        syncPlayerTrackSelection({ play: true });
      }

      function playTrackAt(index) {
        const playlistLength = getPlaylistLength();
        currentTrackIndex = normalizePlaylistIndex(index, playlistLength);
        syncSelectedTrackUi();
        updatePlayerDebug({
          action: "playTrackAt",
        });

        if (!playerReady || !player) {
          return;
        }

        shouldPlayWhenReady = isPlaying;
        syncPlayerTrackSelection({ play: isPlaying, force: true });
      }

      function seekBy(seconds) {
        if (!playerReady || !player || typeof player.seekTo !== "function") {
          return;
        }

        const currentTime =
          typeof player.getCurrentTime === "function" ? player.getCurrentTime() : 0;
        const duration = typeof player.getDuration === "function" ? player.getDuration() : 0;
        const maxTime = duration > 0 ? duration : currentTime + Math.abs(seconds);
        const targetTime = clamp(currentTime + seconds, 0, maxTime);

        player.seekTo(targetTime, true);
      }

      function changeTrack(direction) {
        const playlistLength = getPlaylistLength();
        const targetIndex = normalizePlaylistIndex(currentTrackIndex + direction, playlistLength);
        playTrackAt(targetIndex);
      }

      function loadYouTubeApi() {
        if (window.YT && typeof window.YT.Player === "function") {
          window.onYouTubeIframeAPIReady();
          return;
        }

        if (document.querySelector('script[data-yt-api="true"]')) {
          return;
        }

        const apiScript = document.createElement("script");
        apiScript.src = "https://www.youtube.com/iframe_api";
        apiScript.async = true;
        apiScript.dataset.ytApi = "true";
        apiScript.addEventListener("error", onPlayerError);
        document.head.append(apiScript);
      }

      function createYouTubePlayer({ autoplay = false } = {}) {
        if (player) {
          return;
        }

        playerCreationRequested = true;
        const startingTrack = getTrackAt(currentTrackIndex);
        const playerVars = {
          autoplay: autoplay ? 1 : 0,
          controls: 0,
          playsinline: 1,
          rel: 0,
        };

        if (window.location.protocol.startsWith("http")) {
          playerVars.origin = window.location.origin;
        }

        player = new window.YT.Player("yt-player", {
          width: "240",
          height: "240",
          videoId: startingTrack.videoId || firstVideoId,
          playerVars,
          events: {
            onAutoplayBlocked,
            onError: onPlayerError,
            onReady: onPlayerReady,
            onStateChange: onPlayerStateChange,
          },
        });
      }

      window.onYouTubeIframeAPIReady = function onYouTubeIframeAPIReady() {
        if (!playerCreationRequested && !shouldPlayWhenReady) {
          return;
        }

        createYouTubePlayer({ autoplay: shouldPlayWhenReady });
      };

      accountTab.addEventListener("click", onAccountTabClick);
      timerTab.addEventListener("click", onTimerTabClick);
      timerPanelCloseButton.addEventListener("click", closeTimerPanel);
      timerPresetButtons.forEach((button) => {
        button.addEventListener("click", onTimerPresetClick);
      });
      timerFocusButtons.forEach((button) => {
        button.addEventListener("click", onTimerFocusClick);
      });
      timerStartButton.addEventListener("click", () => {
        void startTimerSession();
      });
      accountPanelCloseButton.addEventListener("click", closeAccountPanel);
      accountUsernameInput.addEventListener("input", onAccountFieldInput);
      accountPanelAvatarButton.addEventListener("click", onAccountAvatarButtonClick);
      accountPhotoFileInput.addEventListener("change", (event) => {
        void onAccountPhotoFileChange(event);
      });
      accountSaveButton.addEventListener("click", () => {
        void saveAccountProfile();
      });
      accountResetPhotoButton.addEventListener("click", () => {
        void resetAccountProfilePhoto();
      });
      accountSignOutButton.addEventListener("click", () => {
        void signOutAccount();
      });
      authGoogleButton.addEventListener("click", () => {
        void signInWithGoogle();
      });
      authCloseButton.addEventListener("click", closeAuthPrompt);
      authDismissButton.addEventListener("click", closeAuthPrompt);
      backgroundSwitcher.addEventListener("click", showNextBackgroundWithUndoCapture);
      backgroundSwitcher.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          showNextBackgroundWithUndoCapture();
        }
      });

      todoTab.addEventListener("click", onTodoTabClick);
      stickyNoteTab.addEventListener("pointerdown", onStickyNoteTabPointerDown);
      window.addEventListener("pointerdown", onGlobalPointerDown, true);
      window.addEventListener("pointermove", onStickyNotePointerMove);
      window.addEventListener("pointerup", onStickyNotePointerUp);
      window.addEventListener("pointercancel", onStickyNotePointerUp);
      noteEditorBackdrop.addEventListener("pointerdown", (event) => {
        if (event.target === noteEditorBackdrop) {
          closeStickyNoteEditor();
        }
      });
      noteEditor.addEventListener("pointerdown", (event) => {
        event.stopPropagation();
      });
      noteTitleInput.addEventListener("beforeinput", onStickyNoteEditorBeforeInput);
      noteBodyInput.addEventListener("beforeinput", onStickyNoteEditorBeforeInput);
      noteTitleInput.addEventListener("keydown", onEditableKeyDown);
      noteBodyInput.addEventListener("keydown", onEditableKeyDown);
      noteTitleInput.addEventListener("input", syncActiveStickyNoteFromEditor);
      noteBodyInput.addEventListener("input", syncActiveStickyNoteFromEditor);
      noteSwatches.forEach((swatch) => {
        swatch.addEventListener("click", () => {
          if (noteEditor.dataset.color !== swatch.dataset.color) {
            captureUndoSnapshot();
          }
          syncStickyNoteSwatches(swatch.dataset.color);
          syncActiveStickyNoteFromEditor();
        });
      });
      playerToggle.addEventListener("click", togglePlayback);
      previousTrackButton.addEventListener("click", () => changeTrack(-1));
      nextTrackButton.addEventListener("click", () => changeTrack(1));
      seekBackButton.addEventListener("click", () => seekBy(-10));
      seekForwardButton.addEventListener("click", () => seekBy(10));

      window.addEventListener("resize", () => {
        window.cancelAnimationFrame(marqueeFrame);
        marqueeFrame = window.requestAnimationFrame(updateMarqueeState);
        updateTodoDockPosition();
        reflowStickyNotes();
      });
      window.addEventListener("keydown", (event) => {
        if (isUndoShortcut(event) && isWithinAccountUi(event.target)) {
          return;
        }

        if (isUndoShortcut(event) && undoLastUserAction()) {
          event.preventDefault();
          event.stopPropagation();
          return;
        }

        if (event.key === "Escape" && isAccountPanelOpen()) {
          closeAccountPanel();
          return;
        }

        if (event.key === "Escape" && isTimerPanelOpen()) {
          closeTimerPanel();
          return;
        }

        if (event.key === "Escape" && authGate.classList.contains("is-visible")) {
          closeAuthPrompt();
          return;
        }

        if (event.key === "Escape" && activeNoteId) {
          closeStickyNoteEditor();
        }
      });

      loadTodoItems();
      updateTodoDockPosition();
      loadStickyNotes();
      syncBackgroundWaveState();
      syncTimerPresetUi();
      syncTimerFocusUi();
      renderAccountFocusStats();
      updateTimerDisplay(0);
      void initializeAccountAuth();
      void renderBackground({ immediate: true });
      setTrackTitle(getTrackTitleAt(currentTrackIndex));
      renderUpcomingTracks();
      updateStripColorForVideo(firstVideoId);
      updatePlayerUnlockUi();
      loadYouTubeApi();
    </script>
  </body>
</html>
