<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>horsemol</title>
    <style>
      :root {
        background: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        min-height: 100vh;
        overflow: hidden;
        background: #000000;
      }

      #background-switcher {
        position: relative;
        display: block;
        width: 100vw;
        height: 100vh;
        border: 0;
        padding: 0;
        overflow: hidden;
        cursor: pointer;
        background: #000000;
        appearance: none;
      }

      #background-image {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 100vw;
        height: 100vh;
        object-fit: cover;
        object-position: center;
        transform: translate(-50%, -50%);
        background: #000000;
      }

      #background-image.is-rotated {
        width: 100vh;
        height: 100vw;
        transform: translate(-50%, -50%) rotate(var(--rotation-angle, -90deg));
      }
    </style>
  </head>
  <body>
    <button id="background-switcher" type="button" aria-label="Change background image">
      <img id="background-image" alt="" />
    </button>

    <script>
      const images = [
        "1.jpg",
        "3.jpg",
        "4.jpg",
        "7.jpg",
        "9.jpg",
        "10.jpg",
      ];

      const backgroundSwitcher = document.getElementById("background-switcher");
      const backgroundImage = document.getElementById("background-image");
      const imageRotations = {
        "1.jpg": "90deg",
      };
      let currentIndex = 0;

      backgroundImage.addEventListener("load", () => {
        const shouldRotate = backgroundImage.naturalHeight > backgroundImage.naturalWidth;
        const currentImage = images[currentIndex];
        const rotationAngle = imageRotations[currentImage] || "-90deg";

        backgroundImage.style.setProperty("--rotation-angle", rotationAngle);
        backgroundImage.classList.toggle("is-rotated", shouldRotate);
      });

      function renderBackground() {
        const currentImage = images[currentIndex];

        backgroundImage.classList.remove("is-rotated");
        backgroundImage.src = encodeURI(currentImage);
        backgroundSwitcher.setAttribute("aria-label", `Show next background image. Current image ${currentIndex}`);
      }

      backgroundSwitcher.addEventListener("click", () => {
        currentIndex = (currentIndex + 1) % images.length;
        renderBackground();
      });

      renderBackground();
    </script>
  </body>
</html>
